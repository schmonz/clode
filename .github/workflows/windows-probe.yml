name: windows-probe

# Phase-0 Windows tjs build survey (spec 2026-07-12): cross-compile the tjs
# ENGINE with mingw-w64 on ubuntu, link a PE, boot `tjs eval 1+1` under Wine.
# Sync primitives stubbed (CLODE_TJS_STUB_SYNC). Dispatch-only; deleted once
# the wall ledger is captured (like ppc-probe). Rich discovery so a failure
# maps the environment; build failures are FINDINGS, not errors.
on:
  workflow_dispatch: {}

jobs:
  survey:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - name: Provision mingw-w64 + wine
        run: |
          set -euo pipefail
          sudo apt-get update -q
          sudo apt-get install -y -q gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 wine64
          echo "=== VERSIONS ==="
          x86_64-w64-mingw32-gcc --version | head -1
          wine64 --version || wine --version || true
          echo "=== sysroot / socket libs ==="
          x86_64-w64-mingw32-gcc -print-sysroot || true
          ls /usr/x86_64-w64-mingw32/lib/libws2_32.a /usr/x86_64-w64-mingw32/lib/libbcrypt.a 2>/dev/null || true
      - name: Source phase (host) + stub the sync primitives
        env:
          CLODE_TJS_VENDOR: ${{ github.workspace }}/.matrix/tjs-vendor
          CLODE_TJS_STUB_SYNC: '1'
        run: |
          npm ci
          node scripts/build-tjs.mjs --source-only
      - name: Cross-build the engine (mingw) — capture the wall ledger
        id: build
        env:
          CLODE_TJS_VENDOR: ${{ github.workspace }}/.matrix/tjs-vendor
          CLODE_TJS_OUT: ${{ github.workspace }}/.matrix/tjs-out
          CLODE_TJS_CROSS_FILE: ${{ github.workspace }}/scripts/windows-mingw.toolchain.cmake
          CLODE_TJS_STUB_SYNC: '1'
          CLODE_TJS_WASM: 'off'
          CLODE_TJS_MIMALLOC: 'off'
          CLODE_TJS_FFI: 'off'
          CLODE_TJS_SMOKE: 'off'
        run: |
          set -uo pipefail
          node scripts/build-tjs.mjs --build-only 2>&1 | tee "$RUNNER_TEMP/build.log"
          status=${PIPESTATUS[0]}
          echo "=== WALL LEDGER (survey findings) ==="
          grep -iE 'error:|undefined reference|No such file|fatal error|cannot find -l' "$RUNNER_TEMP/build.log" \
            | sed 's/^/WALL: /' | sort -u | head -60 || true
          echo "build-status=$status" >> "$GITHUB_OUTPUT"
      - name: Gate the PE shape (if it linked)
        if: steps.build.outputs.build-status == '0'
        run: |
          set -euo pipefail
          f=$(file -b "$GITHUB_WORKSPACE/.matrix/tjs-out/tjs" 2>/dev/null || file -b "$GITHUB_WORKSPACE/.matrix/tjs-out/tjs.exe")
          echo "file: $f"
          case "$f" in *PE32+*x86-64*|*"PE32+ executable"*) echo "PE shape ok" ;; *) echo "ERROR: not a PE32+ x86-64" >&2; exit 1 ;; esac
      - name: Boot under Wine — the success criterion
        if: steps.build.outputs.build-status == '0'
        run: |
          set -uo pipefail
          EXE="$GITHUB_WORKSPACE/.matrix/tjs-out/tjs.exe"
          [ -f "$EXE" ] || EXE="$GITHUB_WORKSPACE/.matrix/tjs-out/tjs"
          out=$(wine64 "$EXE" eval 'console.log(1+1)' 2>&1 | tr -d '\r')
          echo "wine boot: $out"
          echo "$out" | grep -qx 2 && echo "BOOT OK: tjs eval runs on Windows" || { echo "BOOT FAILED (see wall ledger)"; exit 1; }
      - name: Upload the PE (if built) for offline inspection
        if: steps.build.outputs.build-status == '0'
        uses: actions/upload-artifact@v7
        with:
          name: tjs-windows-survey
          path: ${{ github.workspace }}/.matrix/tjs-out/*
          if-no-files-found: warn
