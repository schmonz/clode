name: release

# THE release workflow (unified 2026-07-10, user call — formerly two files:
# the SEA-only release.yml and this matrix; the SEA legs themselves retired
# Phase 4, 2026-07-13): tjs builder legs (T1 native, T1.5 Alpine/musl x8, T2
# VM guests — fuse and smoke run INSIDE the guest; a BSD binary has no binfmt
# escape on a Linux host) are now the ONLY builder family. The release job
# gates on every hard leg succeeding, or nothing publishes; soft legs
# (continue-on-error) contribute artifacts only when green. A release-gate
# tripwire additionally refuses to publish without a windows-arm64 builder
# (Phase 4 dropped the SEA arm64 leg with no tjs replacement yet). One
# SHA256SUMS covers every asset; every asset is SLSA-attested.
# Publishes ONLY clode builders (canon: quaude is derived work, never leaves
# a runner). glibc Linux legs are CI-smoke only (Decision 3) — the published
# Linux artifacts are the musl-static ones. Phase 3 adds the T3 own-qemu
# legs (netbsd aarch64/sparc/i386) through ./.github/actions/guest, whose
# YAML shape is fixed here from day one.
#
# Triggers: a version tag, or manual dispatch (default: artifacts only, no
# release — the dry-run mode; 'draft' mints a draft prerelease to inspect).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: "release handling: skip = artifacts only (dry-run), draft = draft prerelease"
        type: choice
        options: [skip, draft]
        default: skip

permissions:
  contents: read

jobs:
  # The leg matrix lives in scripts/tjs-legs.mjs (single source of truth,
  # shared with per-push CI — user decision 2026-07-11: no duplication
  # between the two GHA builds); the job itself is the reusable
  # tjs-legs.yml. tier: release = the full matrix, publish/attest live.
  # Job stays named 'leg' so the needs: edges below hold.
  # Everything EXCEPT the 4 darwin slices. Split out so the darwin-universal lipo
  # (and the daily-driver darwin artifact) doesn't wait on the whole matrix — the
  # slow NetBSD fleet legs in particular. Job stays named 'leg' so be-oracle's and
  # the release gate's needs: edges hold. (Revert = drop only:notdarwin here +
  # only:darwin on darwin-slices, fold darwin-universal's needs back to [leg].)
  leg:
    uses: ./.github/workflows/tjs-legs.yml
    permissions:
      contents: read
      id-token: write        # actions/attest-build-provenance
      attestations: write
    with:
      tier: release
      only: notdarwin

  # The 4 darwin slices (arm64/x64/x86/ppc) as their OWN job so darwin-universal
  # gates on just these, not the full matrix.
  darwin-slices:
    uses: ./.github/workflows/tjs-legs.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      tier: release
      only: darwin

  # 64-bit big-endian oracle (plan T1.5): the node-shim suite against the
  # s390x-musl tjs under qemu-user binfmt. Provider-gated suites self-skip
  # (no provider here); the engine/url grading and shim behavior rows run.
  # Non-blocking by design — a BE regression is a finding, not a release gate,
  # until the leg earns its way in (house rule: note it, don't grind).
  be-oracle:
    needs: leg
    if: ${{ !cancelled() }}    # run even when an unrelated leg failed; missing artifact fails loudly
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
      - uses: docker/setup-qemu-action@v4   # fix-binary binfmt: host node spawns s390x tjs
      - uses: actions/download-artifact@v8
        with:
          name: tjs-linux-s390x-musl
          path: ${{ runner.temp }}/tjs-s390x
      - name: Install the runtime dep closure
        run: npm ci
      - name: BE oracle — engine + endianness subset (node-shim + url golden)
        env:
          CLODE_TJS: ${{ runner.temp }}/tjs-s390x/tjs
        run: |
          set -euo pipefail
          chmod +x "$CLODE_TJS"
          "$CLODE_TJS" eval 'console.log("s390x tjs alive:", tjs.version)'
          # THE PRIZE: prove the ENGINE is big-endian-correct. First BE matrix
          # run (dispatch #4, run 29065977866) was 124/140 — every
          # endianness-sensitive test GREEN (url characterization = the crown
          # BE test, sha256/hmac KAT, Buffer view semantics, zlib consts). The
          # oracle runs the pure engine/language + BE-sensitive node-shim tests
          # and the url golden, and must be GREEN when the engine is BE-clean.
          #
          # EXCLUDED — not engine, not endianness (all 12 dispatch-#4 reds fell
          # in exactly these four files; each is an environmental or Linux-
          # portability matter, filed as its own workstream in BACKLOG.md, NOT
          # a BE bug):
          #   node-shim-tty         PTY/TTY: no controlling terminal under
          #                         qemu-user headless emulation (harness).
          #   node-shim-child-process  nested child spawn under qemu-user
          #                         binfmt (cwd -> status:null) + the musl
          #                         addchdir limit (#if __APPLE__||__GLIBC__).
          #   node-shim-core        os.constants.signals: the shim's signal
          #                         table is hardcoded DARWIN values (SIGBUS 10
          #                         vs Linux 7) — a real Linux-portability shim
          #                         bug, first surfaced here; separate TDD pass.
          #   node-shim-bunshim     bun:ffi suffix hardcodes the macOS 'dylib'
          #                         (Linux .so) — platform-aware fix pending.
          # Non-blocking (continue-on-error): a NEW data-correctness red stands
          # out against this green baseline. House rule: note it, don't grind.
          EXCLUDE='node-shim-tty|node-shim-child-process|node-shim-core|node-shim-bunshim'
          FILES=$(ls test/node-shim-*.test.cjs | grep -vE "$EXCLUDE")
          node --test --test-concurrency=1 $FILES test/url-characterization.test.cjs

  # The four-arch macOS universal binary: lipo the four darwin ENGINE slices
  # (ppc/i386/x86_64/arm64) into one fat Mach-O, then fuse ONE canonical-LE
  # trailer over it — the trailer is arch-agnostic (canonical-LE proven on
  # real ppc), so every slice reads it. Runs on macos-arm64: the fat
  # template's arm64 slice drives the fuse worker + codesign (proven to
  # handle a ppc-containing fat). HARD (no continue-on-error): the universal is
  # four arches or it is not release-ready — the lipo step exit-1's on any
  # missing slice, and that must block the release, not silently ship an
  # incomplete darwin (all four slice legs are hard too). `if: !cancelled()` so
  # a failed slice leg still runs this job to surface the exact "missing slice"
  # error before it fails. Publishes clode-<ver>-darwin-universal (picked up by
  # the release job's clode-* pattern); the bare fat engine stays a CI artifact.
  darwin-universal:
    needs: darwin-slices
    if: ${{ !cancelled() }}
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
      - name: Download the four darwin engine slices
        uses: actions/download-artifact@v8
        with:
          pattern: tjs-darwin-*
          path: ${{ runner.temp }}/slices
      - name: lipo the four slices into a fat engine + gate
        id: fat
        run: |
          set -euo pipefail
          S="${{ runner.temp }}/slices"
          for a in arm64 x64 x86 ppc; do test -f "$S/tjs-darwin-$a/tjs" || { echo "missing slice $a" >&2; exit 1; }; done
          FAT="${{ runner.temp }}/tjs-darwin-universal"
          lipo -create -output "$FAT" \
            "$S/tjs-darwin-arm64/tjs" "$S/tjs-darwin-x64/tjs" \
            "$S/tjs-darwin-x86/tjs" "$S/tjs-darwin-ppc/tjs"
          chmod +x "$FAT"
          info=$(lipo -info "$FAT"); echo "$info"
          for a in ppc i386 x86_64 arm64; do
            case "$info" in *"$a"*) ;; *) echo "ERROR: fat binary missing $a slice" >&2; exit 1 ;; esac
          done
          # per-slice floors intact (each carries its own LC_VERSION_MIN /
          # LC_BUILD_VERSION — canonical-LE lets one trailer span them all).
          for a in ppc i386 x86_64 arm64; do
            v=$(otool -arch "$a" -l "$FAT" | awk '/LC_VERSION_MIN_MACOSX/{m=1} m&&/version/{print $2; exit}')
            echo "  $a: LC_VERSION_MIN_MACOSX ${v:-<build-version>}"
          done
          echo "fat=$FAT" >> "$GITHUB_OUTPUT"
      - name: Name the universal builder
        id: name
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = tag ]; then V="${GITHUB_REF_NAME#v}"; else V="$(cat VERSION)"; fi
          echo "asset=clode-$V-darwin-universal" >> "$GITHUB_OUTPUT"
      - name: Upload the bare fat engine (CI artifact)
        uses: actions/upload-artifact@v7
        with:
          name: tjs-darwin-universal
          path: ${{ steps.fat.outputs.fat }}
          if-no-files-found: error
      - name: Install deps + esbuild the clode-main bundle
        run: |
          npm ci
          node scripts/build-bundle.mjs
      - name: Fat-fuse the universal builder (arm64 slice drives; trailer spans all)
        env:
          CLODE_TJS: ${{ steps.fat.outputs.fat }}
        run: node bin/clode build --self --out "${{ steps.name.outputs.asset }}"
      - name: Self-smoke the arm64 slice
        run: ./"${{ steps.name.outputs.asset }}" --clode-version
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.name.outputs.asset }}
      - name: Upload the universal builder (published)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.name.outputs.asset }}
          path: ${{ steps.name.outputs.asset }}
          if-no-files-found: error

  # DETERMINISTIC RELEASE (user doctrine 2026-07-14): a release ships a FIXED
  # manifest — every publishing leg. On the release tier soft-fail is stripped
  # from publishers (scripts/tjs-legs.mjs), so `needs: [leg]` requires the WHOLE
  # matrix green: a TCG/qemu flake FAILS the leg job → release is skipped → no
  # mint (rerun-failed the flaked legs until green — slow over non-deterministic).
  # Only engine-only legs (darwin-x86/ppc, publish:false) stay soft — they ship
  # no asset. The gate below is a secondary asset-presence guard.
  release:
    needs: [leg, darwin-slices, darwin-universal]
    if: github.ref_type == 'tag' || inputs.release == 'draft'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: clode-*          # published builders (smoke-* and tjs-* stay CI artifacts)
          path: dist
          merge-multiple: true
      - name: Release gate — required-platform assets present
        run: |
          set -euo pipefail
          # {os arch} pairs that MUST be in the release (floor-agnostic glob;
          # `dist/clode-*-netbsd*-sparc` matches the floored
          # `clode-<ver>-netbsd10.1-sparc`). Only currently-existing required
          # legs go here so the gate stays SATISFIABLE. darwin universal =
          # `clode-<ver>-darwin-universal` (the sole, four-arch darwin asset —
          # no darwin release without it).
          REQUIRED="windows arm64  netbsd sparc  darwin universal"
          missing=0
          set -- $REQUIRED
          while [ $# -ge 2 ]; do
            os="$1"; arch="$2"; shift 2
            if ! ls dist/clode-*-"$os"*-"$arch" >/dev/null 2>&1; then
              echo "RELEASE GATE: missing required asset for $os/$arch" >&2
              missing=1
            fi
          done
          [ "$missing" = 0 ] || { echo "refusing to publish an incomplete release" >&2; exit 1; }
          echo "release gate ok: all required-platform assets present"
      - name: Attach builders + shas to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd dist
          chmod +x clode-*
          sha256sum clode-* > SHA256SUMS
          cat SHA256SUMS
          cd ..
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            TAG="$GITHUB_REF_NAME"
            # A previous run of this same workflow (e.g. re-dispatch) may
            # already have created this release — attach, don't duplicate;
            # create only if we got here first.
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
              || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                   --target "$GITHUB_SHA" --title "$TAG" \
                   --notes "Automated release (tjs matrix)."
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber dist/*
          else
            V="$(cat VERSION)"; TAG="v$V-matrix-test.$GITHUB_RUN_NUMBER"
            echo "Draft prerelease $TAG with: $(ls dist)"
            gh release create "$TAG" --draft --prerelease \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "$TAG" \
              --notes "Matrix dry-run. Assets: $(ls dist | tr '\n' ' ')" \
              dist/*
          fi
