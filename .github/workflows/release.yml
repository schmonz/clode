name: release

on:
  push:
    tags: ['v*']                      # real trigger: a pushed version tag cuts a release
  workflow_dispatch: {}               # manual button

# Default-deny: the build job needs no write. The release job elevates below.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # linux-x64
          - os: ubuntu-24.04-arm   # linux-arm64
          - os: macos-14           # darwin-arm64
          - os: windows-latest     # windows-x64
          - os: windows-11-arm     # windows-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash              # the windows runners default to pwsh; force Git Bash so the
                                 # existing set -euo pipefail / sed / cp steps run unchanged
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - name: Assert Node matches the .tool-versions pin
        run: |
          set -euo pipefail
          want=$(sed -n 's/^nodejs //p' .tool-versions)
          have=$(node -v); have=${have#v}
          [ "$have" = "$want" ] || { echo "node skew: .tool-versions=$want but runtime=$have" >&2; exit 1; }
          echo "node $have matches .tool-versions pin"
      - name: Build the SEA binary
        run: node scripts/build-sea.mjs
      - name: Offline SEA smoke (build + --clode-version/--clode-help)
        run: CLODE_SEA=1 node --test --test-concurrency=1 test/sea-build.test.cjs test/sea-smoke.test.cjs
      - name: Name the binary
        id: name
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = tag ]; then V="${GITHUB_REF_NAME#v}"; else V="$(cat VERSION)"; fi
          BASE=$(node -e "console.log(require('./scripts/platform-tag.cjs').platformTag())")
          BASE=${BASE%-node*}
          # seaBin returns an OS-NATIVE path (backslashes on Windows); normalize to forward
          # slashes so bash `cp` accepts it on the Git Bash runner.
          BIN=$(node -e "const p=require('path');console.log(require('./scripts/platform-tag.cjs').seaBin('.').split(p.sep).join('/'))")
          EXT=""; case "$BIN" in *.exe) EXT=".exe" ;; esac
          # -node = the engine tag (user decision 2026-07-10): tjs builders
          # own the bare clode-<ver>-<platform> names (release-matrix.yml);
          # the transitional Node-SEA binaries are explicitly tagged.
          ASSET="clode-$V-$BASE-node$EXT"
          cp "$BIN" "$ASSET"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.name.outputs.asset }}
          path: ${{ steps.name.outputs.asset }}
          if-no-files-found: error

  release:
    needs: build          # publishes ONLY if every build job succeeded
    runs-on: ubuntu-latest
    permissions:
      contents: write     # only this job writes the release; build stays read-only
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            # The tjs matrix workflow (release-matrix.yml) runs on the same
            # tag and may win the race to create the release — attach, don't
            # duplicate; create only if we got here first (mirror of its own
            # discipline).
            TAG="$GITHUB_REF_NAME"
            echo "Publishing $TAG with: $(ls dist)"
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
              || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                   --target "$GITHUB_SHA" --title "$TAG" \
                   --notes "Automated release."
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber dist/*
          else
            V="$(cat VERSION)"; TAG="v$V-test.$GITHUB_RUN_NUMBER"
            echo "Publishing $TAG (draft) with: $(ls dist)"
            gh release create "$TAG" --draft \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "Automated release. Assets: $(ls dist | tr '\n' ' ')" \
              dist/*
          fi
