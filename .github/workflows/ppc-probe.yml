name: ppc-engine-probe

# The darwin-ppc walk, Phase C bench (spec 2026-07-11-darwin-ppc-walk-design).
# Cross-compiles the tjs ENGINE for powerpc-apple-darwin8 inside the pinned
# VariantXYZ toolchain image, gates the Mach-O shape, uploads the bare engine
# for the Tiger VM oracle. Standalone + dispatch-only while the walk is in
# progress; folds into the manifest + build-leg once green. Rich discovery in
# the build step so a failure maps the environment (no local docker here —
# this IS the ppc bench).
on:
  workflow_dispatch:
    inputs:
      image:
        description: "toolchain image (digest-pinned: gcc 14.2 + MacOSX10.4u SDK)"
        type: string
        default: "ghcr.io/variantxyz/gcc-powerpc-apple-darwin8@sha256:a9013745ae4a696dc3a047675a85e7c43b9453cdb1e26d9a7ac9738587c1e198"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions

      # Source phase on the host (node + esbuild): construct the patched tjs
      # tree + bundles from committed pins. No BE-regen (canonical-LE makes the
      # shipped LE bundles boot on the BE ppc target).
      - name: Construct the patched tjs tree (host)
        env:
          CLODE_TJS_VENDOR: ${{ github.workspace }}/.matrix/tjs-vendor
        run: |
          npm ci
          node scripts/build-tjs.mjs --source-only

      - name: Cross-build the tjs engine (inside the toolchain image)
        run: |
          set -euo pipefail
          docker pull "${{ inputs.image }}"
          docker run --rm -v "${{ github.workspace }}:/w" -w /w "${{ inputs.image }}" bash -c '
            set -uxo pipefail
            echo "===== DISCOVERY ====="
            uname -a; cat /etc/os-release | head -2
            echo "--- toolchain bins ---"; ls /usr/local/bin | grep powerpc || true
            echo "--- cmake / node ---"; which cmake node nodejs || true; cmake --version | head -1
            echo "--- 10.4u SDK ---"; find / -maxdepth 6 -name "MacOSX10.4*" -type d 2>/dev/null | head
            echo "--- existing darwin toolchain files ---"; find / -name "*.cmake" 2>/dev/null | grep -iE "darwin|osxcross|toolchain" | head
            echo "===== NODE ====="
            if ! command -v node >/dev/null; then apt-get update -q && apt-get install -y -q nodejs >/dev/null 2>&1 || true; fi
            node --version || nodejs --version || { echo "NO NODE — will need a static node"; exit 90; }
            echo "===== BUILD ====="
            export CLODE_TJS_VENDOR=/w/.matrix/tjs-vendor
            export CLODE_TJS_OUT=/w/.matrix/tjs-out
            export CLODE_TJS_CROSS_FILE=/w/scripts/darwin-ppc.toolchain.cmake
            export CLODE_TJS_WASM=off CLODE_TJS_MIMALLOC=off CLODE_TJS_FFI=off CLODE_TJS_SMOKE=off
            node scripts/build-tjs.mjs --build-only
          '

      - name: Gate the ppc Mach-O engine
        run: |
          set -euo pipefail
          TJS=.matrix/tjs-out/tjs
          f=$(file -b "$TJS"); echo "file: $f"
          case "$f" in *Mach-O*ppc*|*"Mach-O executable ppc"*) echo "arch marker ok" ;; *) echo "ERROR: not a ppc Mach-O" >&2; exit 1 ;; esac
          # otool from the image (host file(1) already confirmed ppc); floor via the image's otool
          docker run --rm -v "${{ github.workspace }}:/w" -w /w "${{ inputs.image }}" \
            bash -c 'powerpc-apple-darwin8-otool -l .matrix/tjs-out/tjs | grep -A3 "LC_VERSION_MIN\|LC_BUILD_VERSION" | head' || true

      - uses: actions/upload-artifact@v7
        with:
          name: tjs-darwin-ppc
          path: .matrix/tjs-out/tjs
          if-no-files-found: error
