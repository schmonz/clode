name: ci
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  # tjs legs, CI tier (user decision 2026-07-11): every OS in the release
  # matrix on every push, ONE arch each — the manifest (scripts/tjs-legs.mjs)
  # owns the list, the reusable workflow owns the job; nothing is duplicated
  # against release.yml. VM legs run soft-fail until they earn hard status
  # (house rule); the native legs keep their historical hard gate. The tjs
  # build restores from the shared cache on native legs, so a typical push
  # pays only bundle+fuse+smoke there; VM legs pay the guest boot + in-guest
  # build.
  tjs:
    uses: ./.github/workflows/tjs-legs.yml
    permissions:
      contents: read
    with:
      tier: ci
  # Windows shim + sync-primitive coverage (windows-tjs-port spec). Windows is
  # the ONE platform whose shim + sync-primitive layer diverges from POSIX
  # (CRLF, cmd.exe/PATHEXT, drive paths, O_BINARY, the Win32 C sync primitives
  # mod_fs_sync/mod_spawn_sync) — POSIX legs get this coverage free from the
  # host node:test suite on the dev box, but it can only be exercised on a
  # real Windows kernel against a real tjs.exe. Consumes the windows-x64 leg's
  # tjs-windows-x64 engine; the leg's own exec=host job does build+fuse+PONG+
  # publish (subsuming the old fuse-build/fuse-run/builder-smoke jobs). Because
  # this installs the latest @anthropic-ai/claude-code it is also the Windows
  # bundle-bump gate. These finer signals isolate a C-primitive regression from
  # a shim/Bash-tool regression — what the leg's end-to-end PONG cannot.
  windows-x64-tests:
    needs: tjs
    # Run once `tjs` FINISHES, whatever its conclusion — do NOT skip because some
    # OTHER leg failed. This job consumes ONE named artifact; a leg it does not use
    # has no bearing on whether it can run. Plain `needs: tjs` skips the moment any
    # HARD leg fails, which silently deletes this signal: when haiku-x64 was promoted
    # to gating (2026-07-17), a single real haiku regression skipped this job and the
    # three windows jobs in one stroke — a broken gate masking working gates, the
    # exact disease that let the dep-closure P0 through (node-shim-oracle skipped at
    # 9e968b4 for the same reason). If the artifact this job needs is genuinely
    # missing, download-artifact fails it LOUDLY, which is the honest answer.
    if: ${{ !cancelled() }}
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
      - uses: actions/download-artifact@v8
        with:
          name: tjs-windows-x64
          path: .
      - name: Install the Claude provider (npm, latest — the bundle-bump gate)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: Install runtime deps (semver et al.) for the oracles
        run: npm ci --prefix deps/claude
      - name: Sync-primitive battery on the real Windows kernel
        run: |
          set -euo pipefail
          chmod +x ./tjs.exe || true
          ./tjs.exe run test/win-sync-battery.js | tee battery.out
          grep -q '^BATTERY OK' battery.out
      - name: node-shim oracles (roundtrip + agentic) on the real Windows kernel
        run: |
          set -euo pipefail
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "provider: $PROV"
          CLODE_TJS="$PWD/tjs.exe" CLODE_PROVIDER_BIN="$PROV" \
            node --test --test-concurrency=1 \
              test/node-shim-roundtrip.test.cjs \
              test/node-shim-agentic.test.cjs

  # Windows ConPTY TUI render (windows-tjs-port spec, sub-project D). The FIRST
  # CI PTY harness on any platform: build a real quaude (`clode build`) and drive
  # IT directly (tjs.exe + node-shim + the real Claude Code bundle → Ink; no
  # launcher involved — a fused quaude carries its own engine and deps as
  # members) inside a real ConPTY (node-pty) with an xterm emulator on the far
  # end, and assert the welcome box painted. Runs the SAME
  # test/e2e-tui-tjs.test.cjs as POSIX, un-gated here via CLODE_LIVE_RENDER=1 —
  # true on Windows because there is no Keychain GUI modal to hang on (the reason
  # POSIX CI can't run it). Consumes the windows-x64 leg's tjs-windows-x64 engine.
  # Because it installs the latest provider it is also a Windows render bump gate.
  # Render-only; the ConPTY INPUT round-trip is the tracked follow-on (D2).
  windows-x64-tui:
    needs: tjs
    # Run once `tjs` FINISHES, whatever its conclusion — do NOT skip because some
    # OTHER leg failed. This job consumes ONE named artifact; a leg it does not use
    # has no bearing on whether it can run. Plain `needs: tjs` skips the moment any
    # HARD leg fails, which silently deletes this signal: when haiku-x64 was promoted
    # to gating (2026-07-17), a single real haiku regression skipped this job and the
    # three windows jobs in one stroke — a broken gate masking working gates, the
    # exact disease that let the dep-closure P0 through (node-shim-oracle skipped at
    # 9e968b4 for the same reason). If the artifact this job needs is genuinely
    # missing, download-artifact fails it LOUDLY, which is the honest answer.
    if: ${{ !cancelled() }}
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
      - uses: actions/download-artifact@v8
        with:
          name: tjs-windows-x64
          path: .
      - name: Install the Claude provider (npm, latest — the render bump gate)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: Install root runtime deps (render seed deps)
        run: npm ci --prefix deps/claude
      - name: Install the PTY harness (node-pty win32-x64 prebuilt + @xterm/headless)
        run: npm install --prefix test
      - name: Preflight — node-pty can open a ConPTY on this kernel
        run: node test/harness-preflight.cjs
      - name: Render the real TUI under ConPTY and assert the welcome box
        run: |
          set -euo pipefail
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "provider: $PROV"
          chmod +x ./tjs.exe || true
          CLODE_TJS="$PWD/tjs.exe" CLODE_CLAUDE_BIN="$PROV" CLODE_LIVE_RENDER=1 \
            node --test --test-concurrency=1 test/e2e-tui-tjs.test.cjs
      - name: Characterize the node-shim TTY input path under ConPTY (D2)
        run: |
          set -euo pipefail
          chmod +x ./tjs.exe || true
          # Hermetic tjs-vs-node stdin/TTY differential (raw-keystroke ordering,
          # paused-mode read() as Ink reads, setRawMode, UTF-8 split-write) under
          # a real ConPTY. No provider/network — CLODE_TJS + the node-pty harness
          # (already installed above) are all it needs. First CI TTY-input coverage
          # on any platform; a failure pinpoints a shim divergence from node.
          CLODE_TJS="$PWD/tjs.exe" \
            node --test --test-concurrency=1 test/node-shim-tty.test.cjs

  # Windows shim + sync-primitive coverage on the ARM64 kernel — the same
  # rationale as windows-x64-tests, exercised against the windows-arm64 leg's
  # native MSVC ARM64 engine. No tui counterpart yet (out of scope).
  windows-arm64-tests:
    needs: tjs
    # Run once `tjs` FINISHES, whatever its conclusion — do NOT skip because some
    # OTHER leg failed. This job consumes ONE named artifact; a leg it does not use
    # has no bearing on whether it can run. Plain `needs: tjs` skips the moment any
    # HARD leg fails, which silently deletes this signal: when haiku-x64 was promoted
    # to gating (2026-07-17), a single real haiku regression skipped this job and the
    # three windows jobs in one stroke — a broken gate masking working gates, the
    # exact disease that let the dep-closure P0 through (node-shim-oracle skipped at
    # 9e968b4 for the same reason). If the artifact this job needs is genuinely
    # missing, download-artifact fails it LOUDLY, which is the honest answer.
    if: ${{ !cancelled() }}
    runs-on: windows-11-arm
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
      - uses: actions/download-artifact@v8
        with:
          name: tjs-windows-arm64
          path: .
      - name: Install the Claude provider (npm, latest — the bundle-bump gate)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: Install runtime deps (semver et al.) for the oracles
        run: npm ci --prefix deps/claude
      - name: Sync-primitive battery on the real Windows kernel
        run: |
          set -euo pipefail
          chmod +x ./tjs.exe || true
          ./tjs.exe run test/win-sync-battery.js | tee battery.out
          grep -q '^BATTERY OK' battery.out
      - name: node-shim oracles (roundtrip + agentic) on the real Windows kernel
        run: |
          set -euo pipefail
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "provider: $PROV"
          CLODE_TJS="$PWD/tjs.exe" CLODE_PROVIDER_BIN="$PROV" \
            node --test --test-concurrency=1 \
              test/node-shim-roundtrip.test.cjs \
              test/node-shim-agentic.test.cjs

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest    # linux-x64
          - os: windows-latest   # windows-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
      - name: Assert Node matches the .tool-versions pin
        run: |
          set -euo pipefail
          want=$(sed -n 's/^nodejs //p' .tool-versions)
          have=$(node -v); have=${have#v}
          [ "$have" = "$want" ] || { echo "node skew: .tool-versions=$want but runtime=$have" >&2; exit 1; }
      - name: Install runtime deps (the six Bun-backing packages, locked) for the fidelity gate
        run: npm ci --prefix deps/claude
      - name: Full node:test suite (includes the shim-fidelity gate)
        run: npm test

  # node-shim oracle — the node-vs-tjs behavioral diff, run under a REAL tjs.
  # WHY THIS JOB EXISTS: the `test` job above (npm test) never builds a tjs, so
  # every `skipUnlessTjs` node-shim oracle test SILENTLY SKIPS there — the diff
  # that catches shim-vs-node divergence was disabled in the default path. That
  # gap let a real bug ship: fs.readFileSync returned a bare Uint8Array (not a
  # Buffer), so .toString('hex')/.readUInt8 were silently wrong and the Edit tool
  # failed under tjs — no wall, no crash, green everywhere (fixed 2026-07-15,
  # A1 audit). A dedicated, visible job is the standing guard: this class cannot
  # hide again. Reuses the CI-tier linux-x64-musl leg's bare-engine artifact
  # (tjs-<leg>, uploaded expressly "for oracle jobs") — no rebuild. Same run
  # pattern release.yml's be-oracle proved green on s390x-musl.
  node-shim-oracle:
    needs: tjs
    # Run once `tjs` FINISHES, whatever its conclusion — do NOT skip because some
    # OTHER leg failed. This job consumes ONE named artifact; a leg it does not use
    # has no bearing on whether it can run. Plain `needs: tjs` skips the moment any
    # HARD leg fails, which silently deletes this signal: when haiku-x64 was promoted
    # to gating (2026-07-17), a single real haiku regression skipped this job and the
    # three windows jobs in one stroke — a broken gate masking working gates, the
    # exact disease that let the dep-closure P0 through (node-shim-oracle skipped at
    # 9e968b4 for the same reason). If the artifact this job needs is genuinely
    # missing, download-artifact fails it LOUDLY, which is the honest answer.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
      - uses: actions/download-artifact@v8
        with:
          name: tjs-linux-x64-musl   # bare static engine from the CI-tier leg
          path: ${{ runner.temp }}/tjs
      - name: Install the runtime dep closure (ws/yaml/semver/string-width/... for the shim)
        run: npm ci --prefix deps/claude
      # The naude-vs-quaude parity gate stages cli.cjs from a real Bun-packaged
      # provider; with none present it SKIPS, which is exactly the silent-green
      # this job exists to prevent. Same provisioning the windows-x64 job uses.
      - name: Install the Claude provider (npm, latest — the parity gate's input)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: node-shim oracle suite (every module diffed vs host node, under tjs)
        env:
          CLODE_TJS: ${{ runner.temp }}/tjs/tjs
        run: |
          set -euo pipefail
          chmod +x "$CLODE_TJS"
          "$CLODE_TJS" eval 'console.log("linux-x64-musl tjs alive:", tjs.version)'
          # EXCLUDED — env/portability matters tracked separately, NOT shim-vs-node
          # data-correctness (identical rationale to release.yml's be-oracle):
          #   node-shim-tty            no controlling terminal on a headless runner
          #                            (PTY path is covered by windows-x64-tui + e2e-pty)
          #   node-shim-child-process  musl addchdir limit (#if __APPLE__||__GLIBC__)
          #   node-shim-core           shim signal table hardcodes DARWIN values
          #                            (SIGBUS 10 vs Linux 7) — Linux-portability bug, filed
          #   node-shim-bunshim        bun:ffi suffix hardcodes macOS 'dylib' (Linux .so)
          EXCLUDE='node-shim-tty|node-shim-child-process|node-shim-core|node-shim-bunshim'
          FILES=$(ls test/node-shim-*.test.cjs | grep -vE "$EXCLUDE")
          # The parity gate's input: cli.cjs is staged from this provider and run
          # under BOTH targets' runtimes (naude = node, quaude = tjs+shim), then
          # diffed. Fail loud if it is missing — a skipped oracle is not a pass.
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f -name claude -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "provider: $PROV"
          export CLODE_PROVIDER_BIN="$PROV"
          node --test --test-concurrency=1 $FILES
      # The BUILDER, driven the way a user drives it: fuse a native clode, then
      # make THAT binary build a quaude with node absent from PATH.
      #
      # WHY THIS STEP EXISTS (same disease as this job's own header, caught again
      # 2026-07-16): clode-native's acceptances 2+3 are the only proof that the
      # node-free builder can build the product, and they skip silently without
      # CLODE_PROVIDER_BIN. No workflow named the file, so they ran ONLY under
      # `npm test` — a job with no tjs and no provider, where they always skipped.
      # A commit then made the dep-closure gate spawn `process.execPath -e` to
      # introspect the bun-shim; under a fused builder process.execPath IS the
      # fused clode (no node on the box, no `-e`), so EVERY `clode build` under
      # clode-native died at the gate — on pushed main, with CI fully green. The
      # binary that is the entire point of the Q1 split was 100% broken and
      # nothing said a word. This step is the standing guard.
      #
      # It runs HERE because this job already has the three things the
      # acceptances need — a real tjs, deps/claude, and a real Bun provider — so
      # the guard costs one step, not one job.
      # Cache the pinned Node naude embeds so acceptance 4 (below) downloads it
      # from nodejs.org at most once per pin, not every run — and a transient
      # nodejs.org outage reuses the cache instead of turning this step red. Keyed
      # on the pin file so a version bump misses and re-fetches automatically.
      - name: Cache the pinned Node (naude engine)
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/clode-nodes
          key: pinned-node-${{ hashFiles('deps/clode/node-pin.json') }}-${{ runner.os }}-${{ runner.arch }}
      - name: the native builder BUILDS THE PRODUCT (node-free, real provider)
        env:
          CLODE_TJS: ${{ runner.temp }}/tjs/tjs
          # acceptance 4 (naude) fetches the pinned Node into this persistent,
          # cached store instead of a per-run temp dir (test/clode-native.test.cjs
          # honors CLODE_NODES); acceptances 1-3 (quaude) ignore it.
          CLODE_NODES: ${{ runner.temp }}/clode-nodes
        run: |
          set -euo pipefail
          # `build --self` embeds this; without it the fuse has no payload.
          node scripts/build-clode-main.mjs
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f -name claude -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "provider: $PROV"
          # The acceptances prove node-freeness by running the fused builder with
          # PATH=/usr/bin:/bin, and they SKIP if a node lives there ("cannot prove
          # node-freeness here"). Surface that up front: if this runner image ever
          # puts node on the minimal PATH, the skipped-0 assertion below would fail
          # with a confusing message about skips instead of the real reason.
          if PATH=/usr/bin:/bin command -v node; then
            echo "ERROR: this runner has node on /usr/bin:/bin, so the node-free proof cannot run." >&2
            echo "       Give test/clode-native.test.cjs a synthetic minimal PATH, or run this step" >&2
            echo "       on an image without a system node — do NOT just drop the assertion." >&2
            exit 1
          fi
          echo "minimal PATH has no node — the node-free proof can run"
          # A skipped acceptance is not a pass: this test skips itself when the
          # provider is absent, so assert it actually RAN rather than trusting a
          # green exit. That distinction is the whole reason this step exists.
          # Both summary forms are matched on purpose — node prints "ℹ skipped N"
          # (spec reporter) or "# skipped N" (tap), and pinning the wrong one
          # would make this guard fire always or never. Verified locally: node 24
          # emits the spec form even when piped.
          CLODE_PROVIDER_BIN="$PROV" CLODE_CLAUDE_BIN="$PROV" \
            node --test --test-timeout=1200000 test/clode-native.test.cjs 2>&1 | tee native.out
          grep -qE '^(ℹ|#) skipped 0$' native.out \
            || { echo "ERROR: a clode-native acceptance SKIPPED (or the summary format changed) — the node-free builder went unproven" >&2; exit 1; }

      # The packaged targets themselves: build a real naude (Node SEA) and a real
      # quaude (fused tjs) from the same CC and diff them. The model oracle above
      # runs cli.cjs under two engines; only this covers the PACKAGING. Nothing in
      # CI built a naude before, which is how a bug that killed every naude on its
      # first boot ("sea.getRawAsset is not a function") stayed green.
      - name: full-binary oracle — real naude vs real quaude
        env:
          # /tjs/tjs, not /tjs: download-artifact unpacks INTO ${{ runner.temp }}/tjs,
          # so that dir is the artifact, and the engine is the file inside it. Pointing
          # CLODE_TJS at the DIRECTORY made `clode build` read it as the template —
          # "EISDIR: illegal operation on a directory, read". Wrong since this step was
          # written, and invisible twice over: the job used to die at an earlier step
          # (the drifted autoupdater anchor), and then skipped entirely once a hard leg
          # failed. The two steps above always had it right.
          CLODE_TJS: ${{ runner.temp }}/tjs/tjs
          CLODE_ORACLE_BINARIES: '1'
        run: |
          set -euo pipefail
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f -name claude -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          CLODE_PROVIDER_BIN="$PROV" CLODE_CLAUDE_BIN="$PROV" \
            node --test --test-timeout=1200000 test/oracle-binaries.test.cjs

  # node-shim oracle on DARWIN — the same node-vs-tjs behavioral diff as
  # node-shim-oracle above, but on macOS against a real darwin tjs.
  # WHY A SEPARATE JOB: the node-shim is darwin-oriented (signal table, dylib
  # suffix, spawn env handling), so a class of divergences appears ONLY on
  # darwin and the linux oracle cannot see it. Concretely: a process.env mutation
  # did not reach a default-env spawned child under tjs — but only on darwin,
  # because on linux tjs mirrors env into the real environ, so node-shim-env
  # passed there and the bug was invisible in CI until a dev box hit it
  # (2026-07-18). No darwin shim run = that whole class hides. This job is the
  # standing guard. It also runs the child-process/core/bunshim tests the linux
  # oracle must EXCLUDE for musl/signal/dylib portability — on darwin they are
  # native behavior and pass. Consumes the darwin-arm64 leg's bare engine.
  node-shim-oracle-darwin:
    needs: tjs
    # Run once `tjs` FINISHES, whatever its conclusion (same rationale as the
    # windows/node-shim-oracle jobs): this consumes ONE named artifact; a leg it
    # does not use has no bearing on whether it can run.
    if: ${{ !cancelled() }}
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .tool-versions
      - uses: actions/download-artifact@v8
        with:
          name: tjs-darwin-arm64   # bare arm64 engine from the CI-tier darwin leg
          path: ${{ runner.temp }}/tjs
      - name: Install the runtime dep closure (ws/yaml/semver/string-width/... for the shim)
        run: npm ci --prefix deps/claude
      # The parity/roundtrip oracles stage cli.cjs from a real Bun-packaged
      # provider; with none present they SKIP, the silent-green these jobs exist
      # to prevent. Same provisioning as the linux oracle.
      - name: Install the Claude provider (npm, latest — the oracle's input)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: node-shim oracle suite (every module diffed vs host node, under a darwin tjs)
        env:
          CLODE_TJS: ${{ runner.temp }}/tjs/tjs
        run: |
          set -euo pipefail
          chmod +x "$CLODE_TJS"
          "$CLODE_TJS" eval 'console.log("darwin-arm64 tjs alive:", tjs.version)'
          # EXCLUDE only the PTY suite: node-shim-tty needs a controlling terminal
          # / node-pty, covered by windows-x64-tui + the POSIX e2e. Everything else
          # runs here — including child-process/core/bunshim, which the linux
          # oracle excludes for portability and which are the point of a darwin run.
          EXCLUDE='node-shim-tty'
          FILES=$(ls test/node-shim-*.test.cjs | grep -vE "$EXCLUDE")
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f -name claude -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "provider: $PROV"
          export CLODE_PROVIDER_BIN="$PROV"
          node --test --test-concurrency=1 $FILES
