name: ci
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  # tjs legs, CI tier (user decision 2026-07-11): every OS in the release
  # matrix on every push, ONE arch each — the manifest (scripts/tjs-legs.mjs)
  # owns the list, the reusable workflow owns the job; nothing is duplicated
  # against release.yml. VM legs run soft-fail until they earn hard status
  # (house rule); the native legs keep their historical hard gate. The tjs
  # build restores from the shared cache on native legs, so a typical push
  # pays only bundle+fuse+smoke there; VM legs pay the guest boot + in-guest
  # build.
  tjs:
    uses: ./.github/workflows/tjs-legs.yml
    permissions:
      contents: read
    with:
      tier: ci
  # SEA retirement executed 2026-07-10: Windows-only (macOS/Linux have proven
  # tjs replacements); these two retire with the sync-spawn Windows port.
  sea:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest     # windows-x64
          - os: windows-11-arm     # windows-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - name: Assert Node matches the .tool-versions pin
        run: |
          set -euo pipefail
          want=$(sed -n 's/^nodejs //p' .tool-versions)
          have=$(node -v); have=${have#v}
          [ "$have" = "$want" ] || { echo "node skew: .tool-versions=$want but runtime=$have" >&2; exit 1; }
      - name: Install the Claude provider (npm)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: SEA build + smoke + REQUIRED real bundle boot
        run: |
          set -uo pipefail
          # The real Bun binary (~240MB) lives inside the installed package: on POSIX as the
          # nested platform dep (…/claude-code/node_modules/@anthropic-ai/claude-code-<os>-<arch>/claude),
          # on Windows as …/claude-code/bin/claude.exe. Match both names; clode's byte-scan extractor
          # carves either (PE or ELF). Use `npm root -g` (portable: <prefix>/lib/node_modules on POSIX,
          # <prefix>/node_modules on Windows) — NOT `npm prefix -g/node_modules`, which is wrong on POSIX.
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no ~240MB Bun provider found under @anthropic-ai/claude-code" >&2; exit 1; fi
          echo "provider: $PROV"
          # One node:test run: build (sea-build), --clode-version/--clode-help + real boot + sea-deps
          # reuse (sea-smoke, with CLODE_CLAUDE_BIN set so they RUN). CLODE_OFFLINE skips online -p.
          CLODE_SEA=1 CLODE_OFFLINE=1 CLODE_CLAUDE_BIN="$PROV" \
            node --test --test-concurrency=1 test/sea-build.test.cjs test/sea-smoke.test.cjs
  # Phase 1 acceptance gate (windows-tjs-port spec): prove the real Win32
  # sync primitives (Tasks 1-3) on a REAL Windows kernel, not Wine — the
  # overlapped-pipe drain race and the exit-with-buffered race are exactly
  # where Wine may diverge from win32 semantics. Phase 3A consolidation: the
  # windows-x64 tjs-legs leg (the `tjs` job above) already builds the
  # unstubbed engine (real fs/spawn TUs, no stub) and uploads it as
  # tjs-windows-x64; this job just downloads that engine and runs the
  # hostile battery on a real Windows kernel. The ad-hoc mingw cross-build
  # this job used to do itself is retired — one mingw build per push now.
  windows-sync-run:
    needs: tjs
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/download-artifact@v8
        with:
          name: tjs-windows-x64
          path: .
      - name: Run the sync-primitive battery on the real Windows kernel
        run: |
          set -euo pipefail
          chmod +x ./tjs.exe || true
          ./tjs.exe run test/win-sync-battery.js | tee battery.out
          grep -q '^BATTERY OK' battery.out

  # Phase 2 acceptance gate (windows-tjs-port spec): the node-shim (Tasks 1-4)
  # is now Windows-aware end to end — loader path-portability, child_process
  # PATHEXT/shell-quoting, path.win32 completion, os/process dirs+platform.
  # Prove it by running the three node-shim oracles under the real tjs.exe on
  # a real Windows kernel: boot + wire round-trip + agentic Bash-tool turn +
  # the live TUI. Phase 3A consolidation: consumes the windows-x64 tjs-legs
  # leg's tjs-windows-x64 engine (same artifact windows-sync-run uses)
  # instead of cross-building its own. Because the run job always installs
  # the latest @anthropic-ai/claude-code, this job also stands as the
  # Windows bundle-bump gate.
  windows-shim-run:
    needs: tjs
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      # Unlike windows-sync-run (which just execs the built tjs.exe directly),
      # this job runs the oracles under *node* (the harness spawns tjs.exe),
      # and needs npm to install the provider — hence setup-node here.
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - uses: actions/download-artifact@v8
        with:
          name: tjs-windows-x64
          path: .
      - name: Install the Claude provider (npm, latest — this is the bump gate)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: Install runtime deps (semver et al.) for the oracles
        run: npm ci
      - name: Run the substantive tjs oracles on the real Windows kernel
        run: |
          set -euo pipefail
          chmod +x ./tjs.exe || true
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "provider: $PROV"
          # roundtrip (boot + wire turn) and agentic (a real Bash-tool turn
          # spawning bash.exe) prove the node-shim runs the bundle across the
          # whole Windows surface (loader paths, child_process exe/shell/PATHEXT,
          # path.win32, os/process dirs, NODE_PATH, pathToFileURL, deps). Both
          # gate on CLODE_TJS + CLODE_PROVIDER_BIN.
          #
          # e2e-tui-tjs is DEFERRED to Phase 3: it drives the full bin/clode
          # launcher inside a native PTY (node-pty/ConPTY + @xterm/headless),
          # neither of which is provisioned here — and that path is the Windows
          # launcher, not the node-shim. TUI-under-tjs is already proven on
          # POSIX; the Windows ConPTY capture lands with the Phase-3 launcher.
          CLODE_TJS="$PWD/tjs.exe" CLODE_PROVIDER_BIN="$PROV" \
            node --test --test-concurrency=1 \
              test/node-shim-roundtrip.test.cjs \
              test/node-shim-agentic.test.cjs

  # Phase 3B acceptance gate (windows-tjs-port spec): `clode build` cross-fuses
  # a REAL quaude.exe (host worker -> Windows tjs.exe base — Task 1's
  # cross-fuse) and the fused binary self-loads its tx1k1 trailer + completes
  # a turn on a real Windows kernel: the sub-project's proof AND (because the
  # run job always installs the latest @anthropic-ai/claude-code) the standing
  # Windows fuse bump gate. Phase 3A consolidation: the target tjs.exe is no
  # longer cross-built here — it's downloaded from the windows-x64 tjs-legs
  # leg's tjs-windows-x64 artifact. The HOST (linux) tjs build stays: the
  # fuse worker that drives `clode build` must run on the runner's own arch.
  windows-fuse-build:
    needs: tjs
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - name: Install runtime deps (fuse member inputs) + provider (fuse payload source)
        run: |
          npm ci
          npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: Build the HOST (linux) tjs — runs the fuse worker
        run: |
          set -euo pipefail
          CLODE_TJS_WASM=off CLODE_TJS_MIMALLOC=off CLODE_TJS_FFI=off node scripts/build-tjs.mjs
      - uses: actions/download-artifact@v8
        with:
          name: tjs-windows-x64
          path: .matrix/win-tjs
      - name: Cross-fuse quaude.exe (host worker -> windows base)
        run: |
          set -euo pipefail
          HOST_TJS="$PWD/build/tjs/tjs"
          [ -f "$HOST_TJS" ] || { echo "ERROR: no host tjs at $HOST_TJS" >&2; exit 1; }
          WIN_TJS="$PWD/.matrix/win-tjs/tjs.exe"
          [ -f "$WIN_TJS" ] || { echo "ERROR: no target tjs.exe at $WIN_TJS" >&2; exit 1; }
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "host=$HOST_TJS target=$WIN_TJS provider=$PROV"
          CLODE_TJS="$HOST_TJS" CLODE_TARGET_TEMPLATE="$WIN_TJS" CLODE_CLAUDE_BIN="$PROV" \
            node bin/clode build --out "$PWD/quaude.exe"
          test -f "$PWD/quaude.exe"
      - uses: actions/upload-artifact@v7
        with:
          name: quaude-windows-x64
          path: quaude.exe
          if-no-files-found: error

  windows-fuse-run:
    needs: windows-fuse-build
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - uses: actions/download-artifact@v8
        with:
          name: quaude-windows-x64
          path: .
      - name: Install the Claude provider (npm, latest — the fuse bump gate)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: Run the fused-quaude oracle on the real Windows kernel
        run: |
          set -euo pipefail
          chmod +x ./quaude.exe || true
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "provider: $PROV"
          CLODE_QUAUDE_EXE="$PWD/quaude.exe" CLODE_PROVIDER_BIN="$PROV" \
            node --test --test-concurrency=1 test/quaude-fused-win.test.cjs

  # A4 (windows-tjs-port spec, Phase 3A consolidation): prove the PUBLISHED
  # builder (the windows-x64 tjs-legs leg's own `clode build --self` output,
  # not the ad-hoc fuse jobs above) self-loads its tx1k1 trailer on a real
  # Windows kernel. Per-push (ci tier) the leg uploads it smoke-prefixed
  # (smoke-clode-<version>-windows-x64 — never attached to a release); only
  # the release tier uploads the bare clode-<version>-windows-x64 name. The
  # pattern below matches both so this job works unmodified in either tier.
  windows-builder-smoke:
    needs: tjs
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: Download the published windows-x64 clode.exe builder
        uses: actions/download-artifact@v8
        with:
          pattern: '*clode-*-windows-x64'
          path: dl
          merge-multiple: true
      - name: Self-load smoke — the builder boots on the real kernel
        run: |
          set -euo pipefail
          EXE="$(find dl -name '*.exe' -type f | head -1)"
          if [ -z "$EXE" ]; then echo "ERROR: no clode.exe builder artifact" >&2; exit 1; fi
          echo "builder: $EXE"
          chmod +x "$EXE" || true
          "$EXE" --clode-version
          "$EXE" --clode-help | head -20
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - name: Install the Claude provider (npm, latest — native-build bump gate)
        run: npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
      - name: NATIVE BUILD — the published clode.exe builds a quaude.exe on Windows
        run: |
          set -euo pipefail
          EXE="$(find dl -name '*.exe' -type f | head -1)"
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found" >&2; exit 1; fi
          echo "builder: $EXE  provider: $PROV"
          CLODE_CLAUDE_BIN="$PROV" "$EXE" build --out "$PWD/quaude.exe"
          test -f "$PWD/quaude.exe"
      - name: PONG — the natively-built quaude.exe completes a wire turn
        run: |
          set -euo pipefail
          PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
          CLODE_QUAUDE_EXE="$PWD/quaude.exe" CLODE_PROVIDER_BIN="$PROV" \
            node --test --test-concurrency=1 test/quaude-fused-win.test.cjs

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest    # linux-x64
          - os: windows-latest   # windows-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - name: Assert Node matches the .tool-versions pin
        run: |
          set -euo pipefail
          want=$(sed -n 's/^nodejs //p' .tool-versions)
          have=$(node -v); have=${have#v}
          [ "$have" = "$want" ] || { echo "node skew: .tool-versions=$want but runtime=$have" >&2; exit 1; }
      - name: Install runtime deps (the six Bun-backing packages, locked) for the fidelity gate
        run: npm ci
      - name: Full node:test suite (includes the shim-fidelity gate)
        run: npm test
