name: guest
description: >
  The ONE non-native entry point for the release matrix (plan Q2 "The guest
  action"): run a script on a guest platform, same contract for every leg.
  The script runs with cwd = the synced workspace on every backend.
  Backends: "native" (host passthrough); "alpine" (musl build environment as a
  docker container — one mechanism for every host/guest arch pair; foreign
  arches run under qemu-user via tonistiigi/binfmt fix-binary, which ALSO lets
  later host steps exec the guest-built static binaries directly); "vm" via
  cross-platform-actions (netbsd/freebsd/openbsd/dragonflybsd/omnios — QEMU,
  KVM-accelerated on x64 Linux runners; the action starts a persistent VM and
  cpa.sh runs the script inside it with rsync both ways); "solaris" via
  vmactions/solaris-vm (the one v1 platform cross-platform-actions lacks).
  jirutka/setup-alpine was tried first for the musl legs but its post-run
  chroot teardown breaks when invoked from a nested composite action
  (dispatch 29063991061). Remaining dispatcher stubs reserve the phase-3
  backend (own-qemu guest recipes) so workflow YAML shape never changes; the
  endgame is own-qemu absorbing platforms one by one.
inputs:
  platform:
    description: >
      Guest platform: native | alpine | netbsd | freebsd | openbsd |
      dragonflybsd | omnios | solaris. Reserved (phase 3): qemu-*.
    required: true
  arch:
    description: >
      Guest architecture (alpine: x86_64 aarch64 s390x x86 armv7 ppc64le
      riscv64 loongarch64; vm backends: x86_64 or arm64 where the image
      exists — cross-platform-actions accepts x86_64 as an alias).
    required: false
    default: x86_64
  version:
    description: >
      Guest OS version (alpine: release like 3.22; netbsd: 10.1; freebsd:
      14.4; openbsd: 7.9; dragonflybsd: 6.4.2; omnios: r151058; solaris:
       11.4-gcc).
    required: false
    default: "3.22"
  script:
    description: Shell script to run inside the guest (POSIX sh -e semantics)
    required: true
  cache-key:
    description: Image/toolchain cache key (reserved for the qemu backends)
    required: false
    default: ""
  packages:
    description: >
      Packages to install in the guest before the script runs, named in the
      GUEST's package system (apk / pkgin / pkg / pkg_add / IPS). IPS backends
      (omnios, solaris) install per-package and log misses loudly instead of
      failing the whole transaction — one run surfaces every missing name.
    required: false
    default: ""
outputs:
  elapsed-seconds:
    description: Wall-clock seconds the guest script took (including VM boot)
    value: ${{ steps.timing.outputs.elapsed }}
runs:
  using: composite
  steps:
    - name: Dispatch (validate the backend)
      id: dispatch
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.platform }}" in
          native) ;;
          alpine)
            case "${{ inputs.arch }}" in
              x86_64)      p=linux/amd64 ;;
              aarch64)     p=linux/arm64 ;;
              s390x)       p=linux/s390x ;;
              ppc64le)     p=linux/ppc64le ;;
              riscv64)     p=linux/riscv64 ;;
              x86)         p=linux/386 ;;
              armv7|armhf) p=linux/arm/v7 ;;
              loongarch64) p=linux/loong64 ;;
              *) echo "guest: unknown alpine arch '${{ inputs.arch }}'" >&2; exit 64 ;;
            esac
            echo "docker-platform=$p" >> "$GITHUB_OUTPUT" ;;
          netbsd|freebsd|openbsd|dragonflybsd|omnios) ;;   # cross-platform-actions
          solaris) ;;                                      # vmactions
          qemu-*)
            echo "guest: '${{ inputs.platform }}' is a phase-3 backend stub (own-qemu guest-recipe subsystem not implemented yet)" >&2
            exit 64 ;;
          *)
            echo "guest: unknown platform '${{ inputs.platform }}'" >&2
            exit 64 ;;
        esac
        echo "t0=$(date +%s)" >> "$GITHUB_OUTPUT"

    # binfmt (fix-binary) for every non-host arch: makes both the container
    # AND later host steps able to exec foreign-arch binaries. Cheap (~5s),
    # harmless when the guest arch is native.
    - name: Register qemu binfmt
      if: inputs.platform == 'alpine'
      uses: docker/setup-qemu-action@v4

    # Docker Hub's official alpine publishes NO loong64 manifest on any tag
    # (matrix dispatch #5, 2026-07-10). Alpine itself ships loongarch64 since
    # 3.21 — import the sha512-verified minirootfs straight from dl-cdn
    # (provenance BETTER than Hub: the bytes come from alpinelinux.org) under
    # the same local tag the run step expects.
    - name: Import alpine from the official minirootfs (arches Docker Hub lacks)
      if: inputs.platform == 'alpine' && inputs.arch == 'loongarch64'
      shell: bash
      run: |
        set -euo pipefail
        docker image inspect "alpine:${{ inputs.version }}" >/dev/null 2>&1 && exit 0
        BASE="https://dl-cdn.alpinelinux.org/alpine/v${{ inputs.version }}/releases/loongarch64"
        REL=$(curl -fsSL "$BASE/latest-releases.yaml" | awk '$1 == "file:" && $2 ~ /^alpine-minirootfs-.*\.tar\.gz$/ {print $2; exit}')
        [ -n "$REL" ] || { echo "guest: no minirootfs entry in $BASE/latest-releases.yaml" >&2; exit 1; }
        cd "$RUNNER_TEMP"
        curl -fsSLO "$BASE/$REL"
        curl -fsSL "$BASE/$REL.sha512" -o "$REL.sha512"
        sha512sum -c "$REL.sha512"
        docker import --platform linux/loong64 "$REL" "alpine:${{ inputs.version }}"

    - name: Run the guest script (alpine container)
      if: inputs.platform == 'alpine'
      shell: bash
      env:
        CLODE_GUEST_SCRIPT: ${{ inputs.script }}
        CLODE_GUEST_PACKAGES: ${{ inputs.packages }}
      run: |
        set -euo pipefail
        printf '%s\n' "$CLODE_GUEST_SCRIPT" > "$RUNNER_TEMP/guest-script.sh"
        docker run --rm \
          --platform "${{ steps.dispatch.outputs.docker-platform }}" \
          -v /home/runner/work:/home/runner/work \
          -w "$GITHUB_WORKSPACE" \
          -e RUNNER_TEMP -e GITHUB_WORKSPACE \
          -e CLODE_GUEST_PACKAGES \
          "alpine:${{ inputs.version }}" \
          sh -e -c '[ -z "$CLODE_GUEST_PACKAGES" ] || apk add -q $CLODE_GUEST_PACKAGES; sh -e "$RUNNER_TEMP/guest-script.sh"'

    # ---- cross-platform-actions backend: boots a persistent QEMU VM (KVM on
    # x64 Linux runners) and installs cpa.sh on the runner's PATH; the next
    # step executes inside the VM with the workspace rsynced both ways.
    - name: Start the guest VM (cross-platform-actions)
      if: contains('netbsd freebsd openbsd dragonflybsd omnios', inputs.platform)
      uses: cross-platform-actions/action@v1.3.0
      with:
        operating_system: ${{ inputs.platform }}
        version: ${{ inputs.version }}
        architecture: ${{ inputs.arch }}
        cpu_count: 4

    - name: Run the guest script (in the VM via cpa.sh)
      if: contains('netbsd freebsd openbsd dragonflybsd omnios', inputs.platform)
      shell: cpa.sh {0}
      run: |
        set -e
        PKGS="${{ inputs.packages }}"
        case "${{ inputs.platform }}" in
          netbsd)
            [ -z "$PKGS" ] || sudo pkgin -y install $PKGS ;;
          freebsd|dragonflybsd)
            [ -z "$PKGS" ] || sudo env ASSUME_ALWAYS_YES=YES pkg install -y $PKGS ;;
          openbsd)
            [ -z "$PKGS" ] || sudo pkg_add $PKGS ;;
          omnios)
            # IPS: per-package so one run reports EVERY missing name (exit 4 =
            # already installed / nothing to do — fine). The script then fails
            # loudly at the first missing tool.
            for p in $PKGS; do
              sudo pkg install -q "$p" || [ $? -eq 4 ] || echo "guest: OMNIOS-PKG-MISS: $p" >&2
            done
            # ooce packages land outside the default PATH
            PATH="/opt/ooce/bin:$PATH"; export PATH ;;
        esac
        ${{ inputs.script }}

    # ---- vmactions backend: Solaris is the one v1 platform above's action
    # lacks. Boots, rsyncs the workspace in, runs prepare + run as root in the
    # VM, rsyncs back (copyback defaults true). Env vars are copied into the VM.
    - name: Run the guest script (vmactions solaris VM)
      if: inputs.platform == 'solaris'
      uses: vmactions/solaris-vm@v1
      with:
        release: ${{ inputs.version }}
        usesh: true
        prepare: |
          for p in ${{ inputs.packages }}; do
            pkg install -q "$p" || [ $? -eq 4 ] || echo "guest: SOLARIS-PKG-MISS: $p" >&2
          done
        run: |
          set -e
          ${{ inputs.script }}

    # ---- native backend: host passthrough (exists so every leg can share one
    # YAML shape; native legs may also just run steps directly).
    - name: Run the guest script (native)
      if: inputs.platform == 'native'
      shell: bash
      run: ${{ inputs.script }}

    - name: Timing
      id: timing
      shell: bash
      run: echo "elapsed=$(( $(date +%s) - ${{ steps.dispatch.outputs.t0 }} ))" >> "$GITHUB_OUTPUT"
