name: build-leg
description: >
  One release-matrix leg (plan Q2 pipeline shape): construct the patched tjs
  tree from committed material (PINS.md tag+sha, spike/quickjs/patches/* in
  the documented order) -> build tjs (natively, or inside a guest via
  ./.github/actions/guest) -> esbuild clode-main -> fuse the self-contained
  builder (clode build --self, embedded pristine template) -> self-smoke
  (--clode-version always; full = ephemeral quaude fuse + PONG + attest
  against a fetched provider, artifact NEVER uploaded) -> attest -> upload.
  Only BUILDERS are ever published; quaudes are ephemeral runner files.
  Exec modes: `clode build` EXECS the tjs template (the fuse worker runs
  under it) and then execs the fused output. Foreign-LINUX-arch legs get away
  with host-side fuse+smoke because qemu-user binfmt execs the guest binaries;
  BSD/illumos/Solaris binaries have no such escape, so for VM legs the whole
  fuse + smoke runs INSIDE the guest (exec=guest, derived from the platform),
  with tjs-vendor/tjs-out under the workspace — the VM sync boundary.
inputs:
  leg:
    description: Leg tag; names the artifact clode-<version>-<leg>
    required: true
  guest-platform:
    description: "'native' or a ./.github/actions/guest platform (alpine | netbsd | freebsd | openbsd | dragonflybsd | omnios | solaris)"
    required: false
    default: native
  guest-arch:
    description: Guest arch (see the guest action)
    required: false
    default: x86_64
  guest-version:
    description: Guest OS version (see the guest action)
    required: false
    default: "3.22"
  guest-packages:
    description: Packages for the guest, named in the guest's package system (VM legs)
    required: false
    default: ""
  macos-min:
    description: "macOS deployment-target floor (native darwin legs). Empty: stock SDK, no floor."
    required: false
    default: ""
  macos-sdk:
    description: "Pinned old-SDK id to build against (known ids: '10.6', '10.4u'). Empty: the runner's stock SDK."
    required: false
    default: ""
  macos-arch:
    description: "Explicit target arch for the darwin floor build (e.g. 'i386'). Empty: the host arch."
    required: false
    default: ""
  no-exec:
    description: "'true': the runner cannot execute the target output (darwin-x86 i386). Build + floor-gate + upload the BARE engine only — no exec smoke, no fuse, no builder artifact."
    required: false
    default: "false"
  cross-image:
    description: "Docker image (digest-pinned) providing a cross toolchain; when set, the engine is cross-built INSIDE it on an ubuntu runner (darwin-ppc). Implies no-exec."
    required: false
    default: ""
  static:
    description: "'true': fully-static tjs (musl legs) + verify with file/ldd"
    required: false
    default: "false"
  wasm:
    description: >
      'off': build tjs without WASM/WAMR (Linux arches where WAMR's MAP_32BIT
      is undefined: s390x/ppc64le/riscv64/loongarch64/armv7/x86 — and ALL
      non-Linux VM legs: WAMR maps every non-Darwin/Windows/Android system to
      its "linux" platform, whose posix_memmap.c needs Linux's 4-arg mremap).
    required: false
    default: "on"
  mimalloc:
    description: "'off': system malloc instead of mimalloc (mimalloc 3.2.7 does not compile on NetBSD; VM legs start off and re-enable as they prove)"
    required: false
    default: "on"
  ffi:
    description: "'off': no tjs:ffi (spares the guest a libffi dep; nothing shipped imports it)"
    required: false
    default: "on"
  msvc:
    description: "'true': build the Windows engine with MSVC cl.exe (VS dev env) instead of mingw gcc"
    required: false
    default: "false"
  msvc-arch:
    description: "MSVC target arch for the dev-env (x64 | arm64); default x64"
    required: false
    default: "x64"
  floor:
    description: "Compat floor token injected into the published asset name (clode-<ver>-<os><floor>-<arch>); empty = bare name"
    required: false
    default: ""
  smoke:
    description: "'full' (provider fetch + ephemeral quaude PONG) or 'version' (--clode-version only)"
    required: false
    default: full
  attest:
    description: "'true': actions/attest-build-provenance over the builder (caller must grant id-token+attestations write)"
    required: false
    default: "false"
  publish:
    description: "'true': artifact named for release collection; 'false': smoke- prefix (never attached to a release)"
    required: false
    default: "false"
outputs:
  asset:
    description: The builder artifact filename
    value: ${{ steps.name.outputs.asset }}
runs:
  using: composite
  steps:
    - name: Resolve the exec mode and tree locations
      id: mode
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.cross-image }}" ]; then
          exec=cross   # cross-built on ubuntu inside a docker toolchain image (darwin-ppc)
        else
          case "${{ inputs.guest-platform }}" in
            qemu-*) exec=qemu ;;  # own-qemu leg (netbsd-sparc): engine bakes in-guest, builder cross-fuses on the x64 runner, smoke runs via a backend recipe — see the qemu-* steps below
            netbsd|freebsd|openbsd|dragonflybsd|omnios|solaris|midnightbsd|haiku|openindiana) exec=guest ;;
            *) exec=host ;;
          esac
        fi
        echo "exec=$exec" >> "$GITHUB_OUTPUT"
        if [ "$exec" = guest ] || [ "$exec" = cross ] || [ "$exec" = qemu ]; then
          # The VM backends sync the WORKSPACE (rsync); the container build
          # bind-mounts it. Either way the tjs tree + output must live inside.
          echo "vendor=$GITHUB_WORKSPACE/.matrix/tjs-vendor" >> "$GITHUB_OUTPUT"
          echo "out=$GITHUB_WORKSPACE/.matrix/tjs-out" >> "$GITHUB_OUTPUT"
        else
          echo "vendor=$RUNNER_TEMP/tjs-vendor" >> "$GITHUB_OUTPUT"
          echo "out=$RUNNER_TEMP/tjs-out" >> "$GITHUB_OUTPUT"
        fi

    - name: Name the builder artifact
      id: name
      shell: bash
      run: |
        set -euo pipefail
        if [ "${GITHUB_REF_TYPE:-}" = tag ]; then V="${GITHUB_REF_NAME#v}"; else V="$(cat VERSION)"; fi
        LEG="${{ inputs.leg }}"; FLOOR="${{ inputs.floor }}"
        if [ -n "$FLOOR" ]; then
          OS="${LEG%-*}"; ARCH="${LEG##*-}"
          echo "asset=clode-$V-${OS}${FLOOR}-${ARCH}" >> "$GITHUB_OUTPUT"
        else
          echo "asset=clode-$V-${LEG}" >> "$GITHUB_OUTPUT"
        fi

    # The cache key carries the BUILD ENVIRONMENT axes, not just the leg
    # name: guest-version varies per tier (ci = newest, release = oldest
    # floor) and per floor-walk probe, and the runner IMAGE varies for native
    # legs (release builds on the oldest hosted label, ci the newest). A
    # version-blind key restored a 7.9-built tjs into an openbsd@7.6 probe
    # (ld.so: can't load libc) and a 10.1-built one into netbsd@9.x
    # (Undefined PLT symbol) — silently smoking the WRONG binary; a bumped
    # pin (Renovate's included) would do the same. ImageOS is a hosted-runner
    # machine env var (macos14/ubuntu24/...), not in the env context — read
    # it in its own step. For guest legs it names the HOST image (irrelevant
    # to the artifact; occasionally invalidates a cache early — harmless).
    - name: Cache axes (runner image)
      id: axes
      shell: bash
      run: echo "image=${ImageOS:-unknown}" >> "$GITHUB_OUTPUT"
    - name: Restore the built tjs (PINS+patches+recipe+build-env keyed)
      id: tjs-cache
      uses: actions/cache@v6
      with:
        path: ${{ steps.mode.outputs.out }}
        key: tjs-${{ inputs.leg }}-${{ steps.axes.outputs.image }}-${{ inputs.guest-version }}-${{ inputs.macos-min }}-${{ inputs.macos-sdk }}-${{ inputs.cross-image }}-${{ hashFiles('spike/quickjs/PINS.md', 'spike/quickjs/patches/*.patch', 'scripts/build-tjs.mjs', 'scripts/darwin-ppc.toolchain.cmake', 'spike/quickjs/atomic-shim.c') }}

    - name: Force LF line endings for the tjs checkout (native Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Construct the patched tjs tree from pins (host, native speed)
      if: steps.tjs-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        CLODE_TJS_VENDOR: ${{ steps.mode.outputs.vendor }}
      run: node scripts/build-tjs.mjs --source-only

    - name: Install the runtime dep closure (fuse member inputs)
      shell: bash
      run: npm ci

    - name: esbuild the clode-main bundle
      shell: bash
      run: node scripts/build-bundle.mjs

    # The honest-floor SDK (darwin-x64 floor walk, spec 2026-07-11): build
    # against the REAL old headers so every post-floor API is a compile
    # error, not a weak-linked runtime crash on old hardware. The pin is
    # permanent (phracker/MacOSX-SDKs is archived) — no Renovate entry; the
    # sha256 fails the build on any drift.
    - name: Restore the pinned macOS SDK
      if: steps.tjs-cache.outputs.cache-hit != 'true' && inputs.guest-platform == 'native' && inputs.macos-sdk != ''
      id: sdk-cache
      uses: actions/cache@v6
      with:
        path: ${{ runner.temp }}/MacOSX${{ inputs.macos-sdk }}.sdk
        # v2: the SDK dir now carries the Csu-built crt1.10.6.o graft.
        key: macos-sdk-${{ inputs.macos-sdk }}-v2
    - name: Fetch the pinned macOS SDK
      if: steps.tjs-cache.outputs.cache-hit != 'true' && inputs.guest-platform == 'native' && inputs.macos-sdk != ''
      id: sdk
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.macos-sdk }}" in
          10.6)
            URL="https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX10.6.sdk.tar.xz"
            SHA="ad93f3e25c1ee71e457ced1a9c106c2e6741afb96252f259a5b7c625d1156fe8" ;;
          # 10.4u ships its own startup objects (usr/lib/crt1.o, fat
          # ppc/i386/ppc64/x86_64) — no Csu graft, unlike the stripped
          # 10.6 repack.
          10.4u)
            URL="https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX10.4u.sdk.tar.xz"
            SHA="d28276ce6b0f14af30f3bfdc171f8ef4033652da593578568f8be189506c1021" ;;
          *) echo "ERROR: unknown macos-sdk id '${{ inputs.macos-sdk }}'" >&2; exit 1 ;;
        esac
        DEST="${{ runner.temp }}/MacOSX${{ inputs.macos-sdk }}.sdk"
        if [ ! -d "$DEST/usr/include" ]; then
          curl -fsSL -o "${{ runner.temp }}/sdk.tar.xz" "$URL"
          echo "$SHA  ${{ runner.temp }}/sdk.tar.xz" | shasum -a 256 -c -
          tar -xJf "${{ runner.temp }}/sdk.tar.xz" -C "${{ runner.temp }}"
          test -d "$DEST/usr/include"
        fi
        # phracker repacks strip the startup objects, and every pre-10.8
        # deployment target needs crt1.10.6.o (10.8+ switched to LC_MAIN) —
        # probe 1 (run 29165326041) died on exactly this. Build it from
        # Apple's open-source Csu (APSL) and graft it into the SDK: the v3
        # recipe from Csu-85's own Makefile, proven locally 2026-07-11
        # (816-byte .o; hello-world links and carries LC_VERSION_MIN 10.6).
        if [ "${{ inputs.macos-sdk }}" = "10.6" ] && [ ! -f "$DEST/usr/lib/crt1.10.6.o" ]; then
          CSU_URL="https://github.com/apple-oss-distributions/Csu/archive/refs/tags/Csu-85.tar.gz"
          CSU_SHA="87a6bfb1030455e17128d5803e02815e35a1c8bd8bda7bd7f4141431a4d0eac6"
          curl -fsSL -o "${{ runner.temp }}/csu.tar.gz" "$CSU_URL"
          echo "$CSU_SHA  ${{ runner.temp }}/csu.tar.gz" | shasum -a 256 -c -
          tar -xzf "${{ runner.temp }}/csu.tar.gz" -C "${{ runner.temp }}"
          cc -r -arch x86_64 -Os -mmacosx-version-min=10.6 -isysroot "$DEST" \
            -nostdlib -keep_private_externs \
            "${{ runner.temp }}/Csu-Csu-85/start.s" "${{ runner.temp }}/Csu-Csu-85/crt.c" \
            -o "$DEST/usr/lib/crt1.10.6.o" -DADD_PROGRAM_VARS
          test -f "$DEST/usr/lib/crt1.10.6.o"
        fi
        echo "path=$DEST" >> "$GITHUB_OUTPUT"

    - name: Activate the MSVC dev environment (native Windows cl.exe leg)
      if: runner.os == 'Windows' && steps.tjs-cache.outputs.cache-hit != 'true' && inputs.msvc == 'true'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ inputs.msvc-arch }}

    - name: Build tjs (native)
      if: steps.tjs-cache.outputs.cache-hit != 'true' && inputs.guest-platform == 'native' && inputs.cross-image == ''
      shell: bash
      env:
        CLODE_TJS_VENDOR: ${{ steps.mode.outputs.vendor }}
        CLODE_TJS_OUT: ${{ steps.mode.outputs.out }}
        CLODE_TJS_STATIC: ${{ inputs.static == 'true' && '1' || '' }}
        CLODE_TJS_WASM: ${{ inputs.wasm }}
        CLODE_TJS_MIMALLOC: ${{ inputs.mimalloc }}
        CLODE_TJS_FFI: ${{ inputs.ffi }}
        CLODE_TJS_MACOS_MIN: ${{ inputs.macos-min }}
        CLODE_TJS_MACOS_SDK: ${{ steps.sdk.outputs.path }}
        CLODE_TJS_MACOS_ARCH: ${{ inputs.macos-arch }}
        CLODE_TJS_SMOKE: ${{ inputs.no-exec == 'true' && 'off' || 'on' }}
        CLODE_TJS_WIN_MINGW: ${{ runner.os == 'Windows' && inputs.msvc != 'true' && '1' || '' }}
        CLODE_TJS_WIN_MSVC: ${{ runner.os == 'Windows' && inputs.msvc == 'true' && '1' || '' }}
      run: node scripts/build-tjs.mjs --build-only

    - name: Build tjs (alpine guest)
      if: steps.tjs-cache.outputs.cache-hit != 'true' && inputs.guest-platform == 'alpine'
      uses: ./.github/actions/guest
      with:
        platform: ${{ inputs.guest-platform }}
        arch: ${{ inputs.guest-arch }}
        version: ${{ inputs.guest-version }}
        packages: build-base cmake git linux-headers nodejs
        cache-key: tjs-${{ inputs.leg }}
        script: |
          export CLODE_TJS_VENDOR="${{ steps.mode.outputs.vendor }}"
          export CLODE_TJS_OUT="${{ steps.mode.outputs.out }}"
          export CLODE_TJS_STATIC="${{ inputs.static == 'true' && '1' || '' }}"
          export CLODE_TJS_WASM="${{ inputs.wasm }}"
          export CLODE_TJS_MIMALLOC="${{ inputs.mimalloc }}"
          export CLODE_TJS_FFI="${{ inputs.ffi }}"
          node scripts/build-tjs.mjs --build-only

    # Cross-build the engine inside the pinned toolchain image (darwin-ppc:
    # first darwin leg that is neither a mac runner nor a guest VM). The
    # source phase already ran on the ubuntu host (node + esbuild); the
    # container only needs cmake + the cross toolchain (both baked) + node
    # (apt) to drive build-tjs. The image bakes the 10.4u SDK, so no SDK
    # fetch. Canonical-LE means the shipped LE bundles boot on the BE ppc
    # target — no regen. CLODE_TJS_ATOMIC_SHIM: the 32-bit-BE __atomic_*_8
    # link wall (proven on real ppc, run 29182716872).
    - name: Build tjs (darwin cross container)
      if: steps.tjs-cache.outputs.cache-hit != 'true' && inputs.cross-image != ''
      shell: bash
      run: |
        set -euo pipefail
        docker pull "${{ inputs.cross-image }}"
        docker run --rm -v "${{ github.workspace }}:/w" -w /w "${{ inputs.cross-image }}" bash -c '
          set -euxo pipefail
          if ! command -v node >/dev/null; then apt-get update -q && apt-get install -y -q nodejs >/dev/null 2>&1; fi
          node --version
          export CLODE_TJS_VENDOR=/w/.matrix/tjs-vendor
          export CLODE_TJS_OUT=/w/.matrix/tjs-out
          export CLODE_TJS_CROSS_FILE=/w/scripts/darwin-ppc.toolchain.cmake
          export CLODE_TJS_ATOMIC_SHIM=1
          export CLODE_TJS_WASM=${{ inputs.wasm }} CLODE_TJS_MIMALLOC=${{ inputs.mimalloc }} CLODE_TJS_FFI=${{ inputs.ffi }} CLODE_TJS_SMOKE=off
          node scripts/build-tjs.mjs --build-only
        '

    # ---- own-qemu qemu-* legs (netbsd-sparc: first user, plan
    # netbsd-sparc-matrix-leg Task 3 — STRUCTURAL first pass). Unlike a
    # guest/cross leg (fuse + smoke run wholly inside/under the foreign
    # environment), a qemu-* leg splits three ways because the guest has no
    # node (guest-sparc-*.sh's cc/cmake/gmake-direct recipes, not
    # build-tjs.mjs): (A) here — the ENGINE alone bakes in-guest via the
    # own-qemu backend on a tjs-cache miss, synced OUT to
    # steps.mode.outputs.out by the backend (Task 4 tunes the exact recipe +
    # sync — the GUEST-DONE/*-exit marker vocabulary already used by
    # spike/quickjs/qemu/guest-sparc-*.sh); (B) below — the clode --self
    # BUILDER cross-fuses ON the x64 runner; (C) further below — the SMOKE
    # hands the backend a recipe. Guarded so every other leg (exec=host/
    # guest/cross, windows) is untouched.
    - name: Prepare the pinned tjs source + simde for the in-guest engine bake (qemu-* cache miss)
      if: steps.tjs-cache.outputs.cache-hit != 'true' && startsWith(inputs.guest-platform, 'qemu-')
      shell: bash
      env:
        CLODE_TJS_VENDOR: ${{ steps.mode.outputs.vendor }}
      run: |
        set -euo pipefail
        # Patched canonical-LE txiki source (clones txiki + quickjs-ng, applies
        # patches/ — incl. the canonical-LE bytecode patch the cross-fuse REQUIRES;
        # a non-canonical-LE engine gives "checksum error" on the cross-fused
        # builder — proven in the docker-loop wall-walk 2026-07-14).
        node scripts/build-tjs.mjs --source-only
        mkdir -p .matrix/qemu-bake
        tar czf .matrix/qemu-bake/txiki-canonical-le.tar.gz -C "$CLODE_TJS_VENDOR" txiki.js
        # simde (txiki v26.6.0 pins v0.8.2 — the guest build is offline, so stage
        # it; repackage so it extracts to simde-src/ as the bake recipe expects).
        curl -fsSL https://github.com/simd-everywhere/simde/archive/refs/tags/v0.8.2.tar.gz -o "$RUNNER_TEMP/simde.tgz"
        rm -rf "$RUNNER_TEMP/simde-src"; mkdir -p "$RUNNER_TEMP/simde-src"
        tar xzf "$RUNNER_TEMP/simde.tgz" -C "$RUNNER_TEMP/simde-src" --strip-components=1
        tar czf .matrix/qemu-bake/simde-v0.8.2.tar.gz -C "$RUNNER_TEMP" simde-src

    - name: Load the sparc bake recipe (single committed source)
      id: bake-recipe
      if: steps.tjs-cache.outputs.cache-hit != 'true' && startsWith(inputs.guest-platform, 'qemu-')
      shell: bash
      run: |
        set -euo pipefail
        { echo 'script<<CLODE_BAKE_EOF'
          cat spike/quickjs/qemu/ci-guest-bake.sh
          echo 'CLODE_BAKE_EOF'; } >> "$GITHUB_OUTPUT"

    - name: Bake the sparc engine in-guest (own-qemu, qemu-* cache miss)
      if: steps.tjs-cache.outputs.cache-hit != 'true' && startsWith(inputs.guest-platform, 'qemu-')
      uses: ./.github/actions/guest
      with:
        platform: ${{ inputs.guest-platform }}
        arch: ${{ inputs.guest-arch }}
        version: ${{ inputs.guest-version }}
        # BAKED image (gmake+cmake preinstalled) for the cache-miss bake — see CI-IMAGES.md.
        cache-key: wd0-baked-${{ inputs.guest-version }}-gmake-cmake.img.zst
        script: ${{ steps.bake-recipe.outputs.script }}

    - name: Decode + verify the synced-out sparc engine (qemu-* cache miss)
      if: steps.tjs-cache.outputs.cache-hit != 'true' && startsWith(inputs.guest-platform, 'qemu-')
      shell: bash
      run: |
        set -euo pipefail
        # The bake syncs the tjs OUT as a gzip|base64 block on the serial console;
        # ci-sparc-driver.py wrote that console to $CI_SPARC_WORKDIR (set in
        # GITHUB_ENV by the guest action). Decode it to steps.mode.outputs.out/tjs
        # (where the cross-fuse reads CLODE_TARGET_TEMPLATE, and what the tjs-cache
        # saves). Verify against the guest's cksum marker.
        LOG="$CI_SPARC_WORKDIR/ci-sparc-console.log"
        test -f "$LOG" || { echo "no console log at $LOG" >&2; exit 1; }
        OUT="${{ steps.mode.outputs.out }}"; mkdir -p "$OUT"
        awk '/TJS-GZB64-BEGIN/{f=1;next} /TJS-GZB64-END/{f=0} f' "$LOG" \
          | tr -d '\r' | grep -E '^[A-Za-z0-9+/=]+$' | base64 -d | gunzip > "$OUT/tjs"
        chmod +x "$OUT/tjs"
        want=$(grep -oE 'bake-tjs-cksum=[0-9]+ bake-tjs-len=[0-9]+' "$LOG" | tail -1)
        got=$(cksum "$OUT/tjs" | awk '{print "bake-tjs-cksum="$1" bake-tjs-len="$2}')
        echo "want: $want"; echo "got : $got"
        { [ -n "$want" ] && [ "$want" = "$got" ]; } || { echo "engine sync-out cksum/len mismatch" >&2; exit 1; }
        file "$OUT/tjs"

    # (B) Cross-fuse the clode --self BUILDER on the x64 runner, targeting
    # the sparc engine synced out above (the retired windows cross-file
    # leg's mechanism — git show 594f53c~1 — adapted for sparc): build a
    # HOST (linux) tjs to run the fuse worker, then fuse against the
    # foreign-arch TEMPLATE via CLODE_TARGET_TEMPLATE. Unlike windows (whose
    # no-exec native build already produced a bare tjs.exe locally), the
    # sparc bare engine only exists after the guest step above (or a
    # tjs-cache hit) landed it at steps.mode.outputs.out.
    - name: Build the HOST (linux) tjs — runs the fuse worker (qemu-* cross-fuse)
      if: startsWith(inputs.guest-platform, 'qemu-')
      shell: bash
      env:
        CLODE_TJS_VENDOR: ${{ runner.temp }}/host-tjs-vendor
        CLODE_TJS_OUT: ${{ runner.temp }}/host-tjs-out
        CLODE_TJS_WASM: 'off'
        CLODE_TJS_MIMALLOC: 'off'
        CLODE_TJS_FFI: 'off'
      run: |
        set -euo pipefail
        node scripts/build-tjs.mjs   # full native build into a SEPARATE tree (not the .matrix qemu tree)
        test -x "${{ runner.temp }}/host-tjs-out/tjs"

    - name: Cross-fuse the self-contained builder (qemu-* leg)
      if: startsWith(inputs.guest-platform, 'qemu-')
      shell: bash
      env:
        CLODE_TJS: ${{ runner.temp }}/host-tjs-out/tjs
        CLODE_TARGET_TEMPLATE: ${{ steps.mode.outputs.out }}/tjs
      run: |
        set -euo pipefail
        node bin/clode build --self --out "${{ steps.name.outputs.asset }}"
        test -f "${{ steps.name.outputs.asset }}"

    # (C) The runtime smoke: hand the own-qemu backend a recipe that stages
    # the cross-fused sparc clode builder + an x64 provider binary on :8180
    # and runs clode-on-sparc to `build --out quaude` + a PONG check. Uses
    # the PRISTINE image (no toolchain needed for a runtime smoke) — see
    # CI-IMAGES.md.
    - name: Stage the builder + minimal provider for the own-qemu smoke (qemu-* legs)
      if: startsWith(inputs.guest-platform, 'qemu-') && inputs.smoke == 'full'
      shell: bash
      run: |
        set -uo pipefail
        npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
        PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
        if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found under @anthropic-ai/claude-code" >&2; exit 1; fi
        echo "provider: $PROV"
        mkdir -p .matrix/qemu-smoke
        # Pre-carve the 240MB Bun provider to a ~17.5MB synthetic provider: the
        # in-guest carve of the full binary OOMs the 512MB sun4m + is TCG-glacial
        # (>35min); the minimal one fits and is fast. Arch-independent — the
        # extracted cli.cjs is identical. (proven: docker-loop wall-walk 2026-07-14)
        node scripts/make-min-provider.cjs "$PROV" .matrix/qemu-smoke/provider-min
        cp "${{ steps.name.outputs.asset }}" .matrix/qemu-smoke/clode-builder

    - name: Load the sparc smoke recipe (single committed source)
      id: smoke-recipe
      if: startsWith(inputs.guest-platform, 'qemu-') && inputs.smoke == 'full'
      shell: bash
      run: |
        set -euo pipefail
        { echo 'script<<CLODE_SMOKE_EOF'
          cat spike/quickjs/qemu/ci-guest-smoke.sh
          echo 'CLODE_SMOKE_EOF'; } >> "$GITHUB_OUTPUT"

    - name: Smoke via the own-qemu backend (qemu-* legs)
      if: startsWith(inputs.guest-platform, 'qemu-') && inputs.smoke == 'full'
      uses: ./.github/actions/guest
      with:
        platform: ${{ inputs.guest-platform }}
        arch: ${{ inputs.guest-arch }}
        version: ${{ inputs.guest-version }}
        cache-key: wd0-pristine-${{ inputs.guest-version }}.img.zst
        # The proven fuse+PONG recipe (spike/quickjs/qemu/ci-guest-smoke.sh): fetch
        # clode-builder + provider-min over :8180, clode-on-sparc fuses a quaude +
        # internal PONG/attest smoke. smoke-exit=0 == fused + PONG + attest.
        script: ${{ steps.smoke-recipe.outputs.script }}

    # A cache HIT skips the guest setup, so foreign-arch legs still need
    # fix-binary binfmt on the host to exec the cached tjs (fuse worker,
    # smokes). Cheap and idempotent.
    - name: Ensure qemu binfmt for foreign-arch host execution
      if: inputs.guest-platform == 'alpine' && inputs.guest-arch != 'x86_64' && runner.arch == 'X64'
      uses: docker/setup-qemu-action@v4

    - name: Stage the provider for the in-VM full smoke
      if: steps.mode.outputs.exec == 'guest' && inputs.smoke == 'full'
      shell: bash
      run: |
        set -uo pipefail
        npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
        PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
        if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found under @anthropic-ai/claude-code" >&2; exit 1; fi
        echo "provider: $PROV"
        mkdir -p .matrix
        cp "$PROV" .matrix/provider-claude   # bytes only — clode EXTRACTS from it, never execs it

    # The whole exec surface in one guest invocation: build tjs (unless the
    # cache delivered it), fuse the builder UNDER it, smoke the builder, and
    # have the builder build an ephemeral quaude (internal PONG + attest).
    # The guest's node only interprets our scripts; every exec'd artifact
    # (fuse worker, builder, quaude) is guest-native.
    - name: Build + fuse + smoke (inside the guest VM)
      if: steps.mode.outputs.exec == 'guest'
      uses: ./.github/actions/guest
      with:
        platform: ${{ inputs.guest-platform }}
        arch: ${{ inputs.guest-arch }}
        version: ${{ inputs.guest-version }}
        packages: ${{ inputs.guest-packages }}
        cache-key: tjs-${{ inputs.leg }}
        script: |
          # Hardened guests (cpa's OpenBSD image) mount /tmp noexec; the fuse
          # materializes and EXECS the template from a mkdtemp under TMPDIR
          # (exit 127, dispatch #7). The workspace is exec-able everywhere.
          mkdir -p "$PWD/.matrix/tmp"
          TMPDIR="$PWD/.matrix/tmp"; export TMPDIR
          # TCG-emulated guests run 10-20x slower than metal; scale the build
          # pipeline's hang guards accordingly (harmless on KVM legs — these
          # are guards, not pacing; dispatch #14 freebsd-arm64 finding).
          CLODE_TIMEOUT_SCALE=10; export CLODE_TIMEOUT_SCALE
          CLODE_TJS_VENDOR="$PWD/.matrix/tjs-vendor"; export CLODE_TJS_VENDOR
          CLODE_TJS_OUT="$PWD/.matrix/tjs-out"; export CLODE_TJS_OUT
          CLODE_TJS_WASM="${{ inputs.wasm }}"; export CLODE_TJS_WASM
          CLODE_TJS_MIMALLOC="${{ inputs.mimalloc }}"; export CLODE_TJS_MIMALLOC
          CLODE_TJS_FFI="${{ inputs.ffi }}"; export CLODE_TJS_FFI
          if [ ! -x .matrix/tjs-out/tjs ]; then
            node scripts/build-tjs.mjs --build-only
          else
            echo "tjs cache hit: skipping the in-guest build"
          fi
          # The fuse needs only tjs-out + the repo tree; dropping the vendor
          # checkout (+ its object files) here spares the vm-to-runner sync —
          # it is reconstructable from pins and never cached.
          rm -rf .matrix/tjs-vendor
          # Bare-engine spawn probe: separates "tjs spawn is broken on this
          # OS" from "something about the builder's specific spawn is" (the
          # openbsd exit-127 hunt, dispatch #9 — template bytes verified
          # perfect, exec still fails under the builder only).
          .matrix/tjs-out/tjs eval 'tjs.spawn(["/bin/sh","-c","echo tjs-spawn-probe-ok"]).wait().then(function(r){console.log("tjs-spawn-exit:",JSON.stringify(r))})'
          CLODE_TJS="$PWD/.matrix/tjs-out/tjs" node bin/clode build --self --out "./${{ steps.name.outputs.asset }}"
          ./"${{ steps.name.outputs.asset }}" --clode-version
          if [ "${{ inputs.smoke }}" = full ]; then
            CLODE_CLAUDE_BIN="$PWD/.matrix/provider-claude" \
            CLODE_CACHE="$PWD/.matrix/clode-cache" \
            CLODE_DEPS="$PWD/.matrix/clode-deps" \
              ./"${{ steps.name.outputs.asset }}" build --out ./quaude-smoke
            rm -rf ./quaude-smoke .matrix/clode-cache .matrix/clode-deps .matrix/tmp
          fi

    - name: Verify the binary is truly static (musl legs)
      if: inputs.static == 'true'
      shell: bash
      run: |
        set -euo pipefail
        TJS="${{ steps.mode.outputs.out }}/tjs"
        f=$(file -b "$TJS"); echo "file: $f"
        case "${{ inputs.guest-arch }}" in
          x86_64) want="x86-64" ;;
          aarch64) want="aarch64" ;;
          s390x) want="S/390" ;;
          x86) want="80386" ;;
          armv7|armhf) want="ARM" ;;
          ppc64le) want="PowerPC" ;;
          riscv64) want="RISC-V" ;;
          loongarch64) want="LoongArch" ;;
          *) want="" ;;
        esac
        case "$f" in *"$want"*) ;; *) echo "ERROR: arch marker '$want' not in file output" >&2; exit 1 ;; esac
        case "$f" in *"statically linked"*|*"static-pie linked"*) ;; *) echo "ERROR: not statically linked" >&2; exit 1 ;; esac
        ldd "$TJS" 2>&1 | head -3 || true   # informational: expect "not a dynamic executable"

    # Resolves the built tjs path once ahead of the exec=host steps below
    # (.exe on native Windows, plain `tjs` everywhere else). Same shape as
    # `steps.bare` further down, but that resolver runs AFTER these steps
    # (it feeds the tail bare-tjs upload), so it can't be reused here
    # without reordering it — this is a second, narrower resolver instead.
    # exec=qemu is excluded throughout this block: the sparc engine cannot
    # host-exec on the x64 runner, and qemu-* legs fuse+smoke via the
    # dedicated cross-fuse + own-qemu-backend steps above instead.
    - name: Resolve the built tjs path (.exe on native Windows)
      id: tjsbin
      if: steps.mode.outputs.exec != 'guest' && steps.mode.outputs.exec != 'qemu'
      shell: bash
      run: |
        set -euo pipefail
        P="${{ steps.mode.outputs.out }}/tjs.exe"
        [ -f "$P" ] || P="${{ steps.mode.outputs.out }}/tjs"
        [ -f "$P" ]
        echo "path=$P" >> "$GITHUB_OUTPUT"

    - name: Host-exec smoke of the built tjs
      if: steps.mode.outputs.exec != 'guest' && steps.mode.outputs.exec != 'qemu' && inputs.no-exec != 'true'
      shell: bash
      run: |
        set -euo pipefail
        out=$("${{ steps.tjsbin.outputs.path }}" eval 'console.log(typeof __tjs_fs_sync === "object" ? "tjs-shim-ok" : "MISSING-SYNC-FS")')
        echo "tjs host-exec: $out"
        [ "$out" = tjs-shim-ok ]

    - name: Fuse the self-contained builder (clode build --self)
      if: steps.mode.outputs.exec != 'guest' && steps.mode.outputs.exec != 'qemu' && inputs.no-exec != 'true'
      shell: bash
      env:
        CLODE_TJS: ${{ steps.tjsbin.outputs.path }}
      run: node bin/clode build --self --out "${{ steps.name.outputs.asset }}"

    - name: Self-smoke --clode-version (host exec of the fused builder)
      if: steps.mode.outputs.exec != 'guest' && steps.mode.outputs.exec != 'qemu' && inputs.no-exec != 'true'
      shell: bash
      run: |
        set -euo pipefail
        ./"${{ steps.name.outputs.asset }}" --clode-version

    # Resolves the bare-engine path once (.exe on windows, plain `tjs`
    # everywhere else) — feeds the bare-tjs upload at the tail.
    - name: Resolve the bare-engine path (.exe on windows)
      id: bare
      shell: bash
      run: |
        set -euo pipefail
        P="${{ steps.mode.outputs.out }}/tjs.exe"
        [ -f "$P" ] || P="${{ steps.mode.outputs.out }}/tjs"
        [ -f "$P" ]
        echo "path=$P" >> "$GITHUB_OUTPUT"

    # The static floor gate: pre-10.14 dyld requires the old
    # LC_VERSION_MIN_MACOSX load command and refuses LC_BUILD_VERSION-only
    # binaries — and the version must be exactly the pinned floor. Gating
    # the SHIPPED asset (the fuse always runs) covers cache-hit paths too;
    # the floor-carrying cache key guarantees the cached tjs matches. On
    # no-exec legs there is no asset (nothing on the runner can exec the
    # target): gate the bare engine, plus its arch marker.
    # Cross legs run on ubuntu (no host otool): gate the bare engine with the
    # host `file` for the arch marker + the image's otool for the floor.
    - name: Floor gate (cross container) — ppc Mach-O + LC_VERSION_MIN_MACOSX
      if: inputs.macos-min != '' && inputs.cross-image != ''
      shell: bash
      run: |
        set -euo pipefail
        TJS="${{ steps.mode.outputs.out }}/tjs"
        f=$(file -b "$TJS"); echo "file: $f"
        case "$f" in *Mach-O*"${{ inputs.macos-arch }}"*) echo "arch marker ok" ;; *) echo "ERROR: not a ${{ inputs.macos-arch }} Mach-O" >&2; exit 1 ;; esac
        LC=$(docker run --rm -v "${{ github.workspace }}:/w" -w /w "${{ inputs.cross-image }}" \
          bash -c 'powerpc-apple-darwin8-otool -l .matrix/tjs-out/tjs')
        echo "$LC" | grep -q LC_BUILD_VERSION && { echo "ERROR: LC_BUILD_VERSION present — pre-10.14 dyld needs LC_VERSION_MIN_MACOSX" >&2; exit 1; } || true
        got=$(echo "$LC" | awk '/cmd LC_VERSION_MIN_MACOSX/{f=1} f && /version /{print $2; exit}')
        [ "$got" = "${{ inputs.macos-min }}" ] || { echo "ERROR: LC_VERSION_MIN_MACOSX=$got, want ${{ inputs.macos-min }}" >&2; exit 1; }
        echo "floor gate ok (cross): $f, LC_VERSION_MIN_MACOSX $got"

    - name: Floor gate — shipped asset carries LC_VERSION_MIN_MACOSX = the pinned floor
      if: inputs.macos-min != '' && runner.os == 'macOS' && inputs.cross-image == ''
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ inputs.no-exec }}" = "true" ]; then
          TARGET="${{ steps.mode.outputs.out }}/tjs"
        else
          TARGET="./${{ steps.name.outputs.asset }}"
        fi
        if [ -n "${{ inputs.macos-arch }}" ]; then
          f=$(file -b "$TARGET"); echo "file: $f"
          case "$f" in *"${{ inputs.macos-arch }}"*) ;; *) echo "ERROR: arch marker '${{ inputs.macos-arch }}' not in file output" >&2; exit 1 ;; esac
        fi
        LOADCMDS="$RUNNER_TEMP/floor-gate-loadcmds"
        otool -l "$TARGET" > "$LOADCMDS"
        if grep -q LC_BUILD_VERSION "$LOADCMDS"; then
          echo "ERROR: LC_BUILD_VERSION present — pre-10.14 dyld needs LC_VERSION_MIN_MACOSX" >&2
          exit 1
        fi
        got=$(awk '/cmd LC_VERSION_MIN_MACOSX/{f=1} f && /version /{print $2; exit}' "$LOADCMDS")
        if [ "$got" != "${{ inputs.macos-min }}" ]; then
          echo "ERROR: LC_VERSION_MIN_MACOSX=$got, want ${{ inputs.macos-min }}" >&2
          exit 1
        fi
        echo "floor gate ok: LC_VERSION_MIN_MACOSX $got"

    - name: Full smoke — the builder builds the product (ephemeral, NEVER uploaded)
      if: steps.mode.outputs.exec != 'guest' && steps.mode.outputs.exec != 'qemu' && inputs.smoke == 'full' && inputs.no-exec != 'true'
      shell: bash
      run: |
        set -uo pipefail
        npm i -g @anthropic-ai/claude-code 2>&1 | tail -3
        PROV="$(find "$(npm root -g)/@anthropic-ai/claude-code" -type f \( -name claude -o -name claude.exe \) -size +20M 2>/dev/null | head -1)"
        if [ -z "$PROV" ]; then echo "ERROR: no Bun provider found under @anthropic-ai/claude-code" >&2; exit 1; fi
        echo "provider: $PROV"
        set -e
        CLODE_CLAUDE_BIN="$PROV" CLODE_CACHE="$RUNNER_TEMP/clode-cache" \
          ./"${{ steps.name.outputs.asset }}" build --out "$RUNNER_TEMP/quaude-smoke"
        rm -f "$RUNNER_TEMP/quaude-smoke"   # quaude is derived work: ephemeral, never leaves the runner

    - name: Attest build provenance
      if: inputs.attest == 'true' && inputs.no-exec != 'true'
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: ${{ steps.name.outputs.asset }}

    - name: Upload the builder artifact
      if: inputs.no-exec != 'true'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.publish == 'true' && steps.name.outputs.asset || format('smoke-{0}', steps.name.outputs.asset) }}
        path: ${{ steps.name.outputs.asset }}
        if-no-files-found: error

    - name: Upload the bare tjs binary (oracle jobs + debugging)
      uses: actions/upload-artifact@v7
      with:
        name: tjs-${{ inputs.leg }}
        path: ${{ steps.bare.outputs.path }}
        if-no-files-found: error
