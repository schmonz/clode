name: netbsd-crossbuild
description: >
  Produce a NetBSD cross-toolchain + sysroot via build.sh for the given MACHINE.
  The showcase of the tier-2 NetBSD path: any NetBSD architecture is one
  `build.sh -m <machine> tools` + `distribution` away — no per-arch cross-gcc
  packaging. Outputs TOOLDIR (the m68k--netbsdelf-* cross tools) and DESTDIR
  (the sysroot: /usr/include + /usr/lib) for a CMake toolchain file to consume.
  build.sh is slow (tools + a full distribution); the result is cached on
  (machine, src-rev) so only a pin bump pays it again.
inputs:
  machine:
    description: "NetBSD MACHINE (e.g. m68k / sun3 / mac68k)"
    required: true
  arch:
    description: >
      NetBSD MACHINE_ARCH (build.sh -a). REQUIRED for multi-arch ports that have
      no default (evbarm -> earmv7hf/aarch64, sbmips -> mips64eb, evbsh3 -> sh3el);
      build.sh aborts "No MACHINE_ARCH provided" without it. Leave empty for
      single-arch ports (i386, alpha, sparc64, vax, …) that pick their own default.
    required: false
    default: ""
  src-rev:
    description: "NetBSD src git rev/tag/branch to pin (build.sh input)"
    required: true
  sysroot-mode:
    description: >
      'full' (default): `build.sh distribution` — the blessed target, builds all
      of userland to populate DESTDIR. 'light': compose the sysroot from
      `make includes` + the runtime libraries only (csu/libc/libm/libpthread/
      libutil), skipping userland entirely. 'light' dodges NetBSD-src userland
      bugs that never touch the engine (e.g. sbmips usr.sbin/crash fails to build
      at netbsd-10) and is much faster, at the cost of an EMPIRICAL completeness
      bar: the set of libs must be enough for tjs to cross-link. Kept opt-in so
      the proven 'full' legs are untouched until 'light' is confirmed complete.
    required: false
    default: "full"
outputs:
  tooldir:
    description: "the build.sh TOOLDIR (contains bin/<machine-triple>-*)"
    value: ${{ steps.b.outputs.tooldir }}
  destdir:
    description: "the build.sh DESTDIR sysroot"
    value: ${{ steps.b.outputs.destdir }}
runs:
  using: composite
  steps:
    # Cache the whole toolchain+sysroot on (machine, src-rev): a hit skips the
    # entire build.sh run. The paths live under RUNNER_TEMP (stable across the
    # job) so the cache restore lands where the toolchain file expects them.
    - name: Restore the build.sh toolchain + sysroot
      id: nbcache
      uses: actions/cache@v6.1.0
      with:
        path: |
          ${{ runner.temp }}/nbsd-tool
          ${{ runner.temp }}/nbsd-dest
        # A light sysroot is a different artifact than a full one, so it must not
        # share a cache entry. Full keeps the historical key unchanged (the 8
        # green legs' caches stay valid); light gets its own suffix.
        key: netbsd-crossbuild-${{ inputs.machine }}-${{ inputs.arch }}-${{ inputs.src-rev }}${{ inputs.sysroot-mode == 'light' && '-light' || '' }}-v1
    - id: b
      shell: bash
      run: |
        set -euo pipefail
        TOOL="$RUNNER_TEMP/nbsd-tool"; DEST="$RUNNER_TEMP/nbsd-dest"
        echo "tooldir=$TOOL" >> "$GITHUB_OUTPUT"
        echo "destdir=$DEST" >> "$GITHUB_OUTPUT"
        # Any NetBSD arch's cross gcc is <arch>--netbsd[elf]-gcc — glob, don't
        # hardcode m68k (that broke sparc64: sparc64--netbsd-gcc).
        if ls "$TOOL"/bin/*--netbsd*-gcc >/dev/null 2>&1 && [ -d "$DEST/usr/include" ]; then
          echo "build.sh toolchain restored from cache — skipping the build"
          exit 0
        fi
        SRC="$RUNNER_TEMP/nbsd-src"
        # Shallow-fetch the pinned src (a tag/branch fast-paths --branch; a bare
        # rev falls back to a filtered clone + checkout).
        git clone --depth 1 --branch "${{ inputs.src-rev }}" https://github.com/NetBSD/src "$SRC" 2>/dev/null \
          || { git clone --filter=blob:none https://github.com/NetBSD/src "$SRC"; git -C "$SRC" checkout "${{ inputs.src-rev }}"; }
        cd "$SRC"
        # -U unprivileged (no root); -T/-D place the tools + sysroot under
        # RUNNER_TEMP so the cache can carry them. `tools` builds the cross
        # toolchain; `distribution` populates DESTDIR's headers + libs (the
        # sysroot the tjs cross-build links against). Heavy but cached. Cap -j at
        # 2: the 64-bit userland build (sparc64) OOM'd a 16GB runner at -j nproc;
        # the cap only slows the rare cache-miss.
        J="$(nproc)"; [ "$J" -gt 2 ] && J=2
        # Multi-arch ports (evbarm/sbmips/evbsh3) have no default MACHINE_ARCH and
        # abort without -a; single-arch ports pick their own, so pass -a only when set.
        ARCHOPT=(); [ -n "${{ inputs.arch }}" ] && ARCHOPT=(-a "${{ inputs.arch }}")
        ./build.sh -m "${{ inputs.machine }}" "${ARCHOPT[@]}" -U -T "$TOOL" -D "$DEST" -j "$J" tools
        if [ "${{ inputs.sysroot-mode }}" = light ]; then
          # LIGHT sysroot: there is no blessed build.sh "sysroot only" operation,
          # so compose one from make targets one level down via the nbmake wrapper
          # `tools` produced. `makewrapper` bakes MACHINE/MACHINE_ARCH/DESTDIR/
          # TOOLDIR (and MKUNPRIVED, from -U) into nbmake-<machine>. `distrib-dirs`
          # then creates the DESTDIR hierarchy AND seeds the METALOG that
          # unprivileged installs append to — `distribution` normally does this via
          # installworld, so skipping straight to `includes` failed with "open
          # DESTDIR/METALOG: No such file or directory" + a missing usr/include
          # (run 30074218732). After that, `includes` installs all system headers,
          # then build+install ONLY the runtime libraries tjs links against, in
          # dependency order (csu first for crt*.o, then libc, then its dependents).
          # This never descends into usr.sbin, so userland bugs (e.g. sbmips
          # usr.sbin/crash "unknown type name 'bool'" at netbsd-10) never fire.
          # The lib list is the EMPIRICAL part: if tjs later fails to link on a
          # missing symbol, add the owning lib subdir here.
          ./build.sh -m "${{ inputs.machine }}" "${ARCHOPT[@]}" -U -T "$TOOL" -D "$DEST" -j "$J" makewrapper
          NBMAKE=$(ls "$TOOL"/bin/nbmake-* 2>/dev/null | head -1)
          [ -x "$NBMAKE" ] || { echo "build.sh: no nbmake-* wrapper under $TOOL/bin" >&2; ls "$TOOL/bin" | head; exit 1; }
          "$NBMAKE" -C "$SRC/etc" distrib-dirs
          "$NBMAKE" -C "$SRC" includes
          for libdir in csu libc libm libpthread libutil; do
            "$NBMAKE" -C "$SRC/lib/$libdir" -j "$J" dependall install
          done
          test -e "$DEST"/usr/lib/libc.* || { echo "light sysroot: no libc under $DEST/usr/lib" >&2; ls "$DEST/usr/lib" 2>/dev/null | head; exit 1; }
        else
          ./build.sh -m "${{ inputs.machine }}" "${ARCHOPT[@]}" -U -T "$TOOL" -D "$DEST" -j "$J" distribution
        fi
        ls "$TOOL"/bin/*--netbsd*-gcc >/dev/null 2>&1 || { echo "build.sh: no *--netbsd*-gcc under $TOOL/bin" >&2; ls "$TOOL/bin" | head; exit 1; }
        test -d "$DEST/usr/include" || { echo "build.sh: no sysroot headers under $DEST/usr/include" >&2; exit 1; }
        # Free the src tree once the toolchain + sysroot are built (keeps the
        # cache small and the runner disk clear).
        rm -rf "$SRC"
